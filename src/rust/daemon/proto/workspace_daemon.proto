// EnqueueItem Request
message EnqueueItemRequest {
    string item_type = 1;                             // text, file, url, website, doc, folder, tenant, collection
    string op = 2;                                    // add, update, delete, scan, rename, uplift, reset
    string tenant_id = 3;                             // Multi-tenant identifier
    string collection = 4;                            // projects, libraries, rules, scratchpad
    string payload_json = 5;                          // JSON payload
    string branch = 6;                                // Git branch (default: "main")
    optional string metadata_json = 7;                // Optional metadata JSON
}

// EnqueueItem Response
message EnqueueItemResponse {
    string queue_id = 1;                              // Assigned or existing queue ID
    string idempotency_key = 2;                       // Computed idempotency key
    bool is_new = 3;                                  // True if newly inserted, false if duplicate
}

// RetryAll Response
message RetryAllResponse {
    uint32 reset_count = 1;                           // Number of failed items reset to pending
}

// RetryItem Request
message RetryItemRequest {
    string queue_id = 1;                              // Exact queue_id or prefix
}

// RetryItem Response
message RetryItemResponse {
    bool found = 1;                                   // Whether the item was found
    string resolved_id = 2;                           // Full queue_id that was matched
    string previous_status = 3;                       // Status before retry (should be "failed")
    int32 previous_retry_count = 4;                   // Retry count before reset
    bool reset = 5;                                   // True if item was actually reset
}

// CleanQueue Request
message CleanQueueRequest {
    int32 older_than_days = 1;                        // Delete items older than N days
    repeated string statuses = 2;                     // Statuses to clean (default: done, failed)
}

// CleanQueue Response
message CleanQueueResponse {
    uint32 deleted_count = 1;                         // Number of items deleted
}

// CancelItems Request
message CancelItemsRequest {
    string tenant_id = 1;                             // Tenant to cancel items for
    repeated string statuses = 2;                     // Statuses to cancel (in_progress always excluded)
    bool dry_run = 3;                                 // If true, return count without deleting
}

// CancelItems Response
message CancelItemsResponse {
    uint32 count = 1;                                 // Items deleted (or would be deleted in dry_run)
    string tenant_id = 2;                             // Resolved tenant_id
    string project_path = 3;                          // [canonical] Resolved project path (for display)
    bool is_dry_run = 4;                              // Echoes dry_run flag
}

// RemoveItem Request
message RemoveItemRequest {
    string queue_id = 1;                              // Exact queue_id, prefix, or idempotency key prefix
}

// RemoveItem Response
message RemoveItemResponse {
    bool found = 1;                                   // Whether the item was found
    string resolved_id = 2;                           // Full queue_id that was matched
    string item_type = 3;                             // Item type of removed item
    string op = 4;                                    // Operation of removed item
    string collection = 5;                            // Collection of removed item
    string status = 6;                                // Status before removal
}

// CleanQueueByCollection Request
message CleanQueueByCollectionRequest {
    repeated string collections = 1;                  // Collection names to clean
    repeated string statuses = 2;                     // Statuses to clean (default: pending, failed)
}

// ReplayDlqItem Request
message ReplayDlqItemRequest {
    string dlq_id = 1;                                // DLQ entry to replay
    bool force = 2;                                   // Override permanent_data guard
}

// ReplayDlqItem Response
message ReplayDlqItemResponse {
    bool success = 1;                                 // Whether replay succeeded
    string new_queue_id = 2;                          // New queue item ID
    string error = 3;                                 // Error message if failed
}

// PurgeDlq Request
message PurgeDlqRequest {
    int32 retention_days = 1;                         // Purge entries older than N days
    string tenant_id = 2;                             // Optional: filter by tenant
    string category = 3;                              // Optional: filter by error category
}

// PurgeDlq Response
message PurgeDlqResponse {
    int32 rows_deleted = 1;                           // Number of DLQ entries purged
    bool has_more = 2;                                // True if more entries match criteria
}

// ListDlq Request
message ListDlqRequest {
    string tenant_id = 1;                             // Optional: filter by tenant
    string category = 2;                              // Optional: filter by error category
    int32 limit = 3;                                  // Max entries to return (default: 50)
    int32 offset = 4;                                 // Pagination offset
}

// ListDlq Response
message ListDlqResponse {
    repeated DlqEntry entries = 1;                    // DLQ entries
    int32 total = 2;                                  // Total matching entries
}

// DlqEntry - single dead letter queue item
message DlqEntry {
    string dlq_id = 1;                                // DLQ entry ID
    string original_queue_id = 2;                     // Original queue item ID
    string item_type = 3;                             // Item type (doc, file, etc.)
    string op = 4;                                    // Operation (add, update, etc.)
    string tenant_id = 5;                             // Tenant ID
    string collection = 6;                            // Collection name
    string branch = 7;                                // Branch
    string file_path = 8;                             // File path
    string error_category = 9;                        // Error category
    string error_message = 10;                        // Error message
    int32 retry_count = 11;                           // Retries before DLQ
    int32 resurrection_count = 12;                    // Resurrections before DLQ
    string final_failure_at = 13;                     // When final failure occurred
    string moved_to_dlq_at = 14;                      // When moved to DLQ
}

