syntax = "proto3";

package workspace_daemon;

// Import common types
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// SERVICE DEFINITIONS
// =============================================================================
// This protocol defines 12 services for communication between the Rust daemon
// and TypeScript components (MCP server, CLI).
//
// Core Services (spec-defined):
// - SystemService: Health, metrics, queue stats, lifecycle
// - CollectionService: Qdrant collection CRUD and alias management
// - DocumentService: Direct text ingestion (not file-based)
//
// Write Services (daemon-exclusive SQLite writes):
// - QueueWriteService: Queue item lifecycle mutations
// - WatchWriteService: Watch folder state mutations
// - LibraryWriteService: Library management mutations
// - TrackingWriteService: Observability and mirror mutations
// - AdminWriteService: Administrative mutations
//
// Supporting Services:
// - EmbeddingService: Generate embeddings for MCP server hybrid search
// - ProjectService: Multi-tenant project lifecycle and session management
// - TextSearchService: FTS5-based code search
// - GraphService: Code relationship graph queries
//
// Design principles:
// - Single writer pattern: Only daemon writes to SQLite state.db and Qdrant
// - Queue-based async processing: File operations via SQLite queue
// - Direct sync ingestion: Text content via gRPC IngestText
// - Event-driven refresh: Lightweight signals for state changes
// - Session-based priority: Active MCP sessions get HIGH priority
// =============================================================================

// -----------------------------------------------------------------------------
// 1. SystemService (9 RPCs)
// -----------------------------------------------------------------------------
// Purpose: System health monitoring, status reporting, refresh signaling,
//          and lifecycle management.

service SystemService {
    // Quick health check for monitoring/alerting (spec: Health)
    rpc Health(google.protobuf.Empty) returns (HealthResponse);

    // Comprehensive system state snapshot
    rpc GetStatus(google.protobuf.Empty) returns (SystemStatusResponse);

    // Current performance metrics (no historical data)
    rpc GetMetrics(google.protobuf.Empty) returns (MetricsResponse);

    // Queue statistics for monitoring (spec: GetQueueStats)
    rpc GetQueueStats(google.protobuf.Empty) returns (QueueStatsResponse);

    // Graceful daemon shutdown (spec: Shutdown)
    rpc Shutdown(google.protobuf.Empty) returns (google.protobuf.Empty);

    // Signal database state changes for event-driven refresh
    rpc SendRefreshSignal(RefreshSignalRequest) returns (google.protobuf.Empty);

    // MCP/CLI server lifecycle notifications
    rpc NotifyServerStatus(ServerStatusNotification) returns (google.protobuf.Empty);

    // Pause all file watchers (master switch)
    rpc PauseAllWatchers(google.protobuf.Empty) returns (google.protobuf.Empty);

    // Resume all file watchers (master switch)
    rpc ResumeAllWatchers(google.protobuf.Empty) returns (google.protobuf.Empty);

    // Rebuild computed indexes (tag hierarchy, FTS, sparse vectors, etc.)
    rpc RebuildIndex(RebuildIndexRequest) returns (RebuildIndexResponse);

    // Embedding provider status: configured provider, model, dim, probe state
    rpc GetEmbeddingProviderStatus(google.protobuf.Empty) returns (GetEmbeddingProviderStatusResponse);

    // List dead letter queue entries with optional filtering
    rpc ListDlq(ListDlqRequest) returns (ListDlqResponse);
}

// -----------------------------------------------------------------------------
// 2. CollectionService (7 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Qdrant collection lifecycle and alias management.

service CollectionService {
    // Create collection with proper configuration
    rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);

    // Delete collection and all its data
    rpc DeleteCollection(DeleteCollectionRequest) returns (google.protobuf.Empty);

    // List all collections (spec: ListCollections)
    rpc ListCollections(google.protobuf.Empty) returns (ListCollectionsResponse);

    // Get collection metadata (spec: GetCollection)
    rpc GetCollection(GetCollectionRequest) returns (GetCollectionResponse);

    // Create collection alias (for tenant_id changes)
    rpc CreateCollectionAlias(CreateAliasRequest) returns (google.protobuf.Empty);

    // Delete collection alias
    rpc DeleteCollectionAlias(DeleteAliasRequest) returns (google.protobuf.Empty);

    // Atomically rename alias (safer than delete + create)
    rpc RenameCollectionAlias(RenameAliasRequest) returns (google.protobuf.Empty);
}

// -----------------------------------------------------------------------------
// 3. DocumentService (3 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Direct text ingestion (not file-based).
// Use case: Content not from files - user input, chat snippets, scraped web
//           content, manual notes.

service DocumentService {
    // Ingest text content directly (synchronous)
    rpc IngestText(IngestTextRequest) returns (IngestTextResponse);

    // Update previously ingested document (spec: UpdateDocument)
    rpc UpdateDocument(UpdateDocumentRequest) returns (UpdateDocumentResponse);

    // Delete ingested document (spec: DeleteDocument)
    rpc DeleteDocument(DeleteDocumentRequest) returns (google.protobuf.Empty);
}

// -----------------------------------------------------------------------------
// 4. EmbeddingService (2 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Generate embeddings for TypeScript MCP server.
// Use case: TypeScript server needs embeddings for hybrid search but cannot
//           run FastEmbed locally. Centralizes embedding model in daemon.

service EmbeddingService {
    // Generate dense embedding vector from text
    rpc EmbedText(EmbedTextRequest) returns (EmbedTextResponse);

    // Generate sparse vector (BM25-style) from text
    rpc GenerateSparseVector(SparseVectorRequest) returns (SparseVectorResponse);
}

// -----------------------------------------------------------------------------
// 5. ProjectService (8 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Multi-tenant project lifecycle and session management.
// Use case: MCP servers register active projects, daemon prioritizes their
//           ingestion. Heartbeat mechanism detects orphaned sessions.

service ProjectService {
    // Register a project for tracking/processing
    // Called by MCP server (with priority="high") or CLI (default priority="normal")
    rpc RegisterProject(RegisterProjectRequest) returns (RegisterProjectResponse);

    // Deprioritize a project (decrement session count)
    // Called when MCP server stops
    rpc DeprioritizeProject(DeprioritizeProjectRequest) returns (DeprioritizeProjectResponse);

    // Get current status of a project
    rpc GetProjectStatus(GetProjectStatusRequest) returns (GetProjectStatusResponse);

    // List all registered projects with their status
    rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

    // Heartbeat to keep session alive (60s timeout)
    // Called periodically by MCP servers
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    // Rename a tenant_id across SQLite and queue Qdrant payload updates
    rpc RenameTenant(RenameTenantRequest) returns (RenameTenantResponse);

    // Delete a project and optionally its Qdrant data
    rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

    // Get all project groups a tenant belongs to (for cross-project search)
    rpc GetProjectGroups(GetProjectGroupsRequest) returns (GetProjectGroupsResponse);

    // Resolve search scope to concrete tenant filter (for MCP server search)
    rpc ResolveSearchScope(ResolveSearchScopeRequest) returns (ResolveSearchScopeResponse);
}

// =============================================================================
// MESSAGE TYPES - SystemService
// =============================================================================

// Health Response (spec: HealthResponse)
message HealthResponse {
    ServiceStatus status = 1;                     // Overall health
    repeated ComponentHealth components = 2;      // Per-component status
    google.protobuf.Timestamp timestamp = 3;      // Check timestamp
}

// QueueStats Response (spec: GetQueueStats)
message QueueStatsResponse {
    int32 pending_count = 1;                      // Items pending processing
    int32 in_progress_count = 2;                  // Items currently processing
    int32 completed_count = 3;                    // Items completed (last 24h)
    int32 failed_count = 4;                       // Items failed (last 24h)
    map<string, int32> by_item_type = 5;          // Breakdown by item_type
    map<string, int32> by_collection = 6;         // Breakdown by collection
    int32 stale_items_count = 7;                  // Items with expired leases
    google.protobuf.Timestamp collected_at = 8;   // Stats collection time
}

message ComponentHealth {
    string component_name = 1;                    // e.g., "queue_processor", "file_watcher"
    ServiceStatus status = 2;
    string message = 3;                           // Human-readable status
    google.protobuf.Timestamp last_check = 4;
}

// GetStatus Response
message SystemStatusResponse {
    ServiceStatus status = 1;
    SystemMetrics metrics = 2;                    // CPU, memory, disk
    repeated string active_projects = 3;          // Currently watched projects
    int32 total_documents = 4;                    // Documents in Qdrant
    int32 total_collections = 5;                  // Collections in Qdrant
    google.protobuf.Timestamp uptime_since = 6;   // Daemon start time
    // Adaptive resource profile (idle/burst mode)
    optional string resource_mode = 7;            // "normal", "ramping", "burst"
    optional double idle_seconds = 8;             // Seconds since last user input
    optional int32 current_max_embeddings = 9;    // Current concurrent embedding limit
    optional int64 current_inter_item_delay_ms = 10; // Current inter-item delay
}

message SystemMetrics {
    double cpu_usage_percent = 1;
    int64 memory_usage_bytes = 2;
    int64 memory_total_bytes = 3;
    int64 disk_usage_bytes = 4;
    int64 disk_total_bytes = 5;
    int32 active_connections = 6;                 // Active gRPC connections
    int32 pending_operations = 7;                 // Queue depth
}

// GetMetrics Response
message MetricsResponse {
    repeated Metric metrics = 1;
    google.protobuf.Timestamp collected_at = 2;
}

message Metric {
    string name = 1;                              // e.g., "queue_throughput"
    string type = 2;                              // "counter", "gauge", "histogram"
    map<string, string> labels = 3;               // Metric dimensions
    double value = 4;
    google.protobuf.Timestamp timestamp = 5;
}

// RebuildIndex Request
message RebuildIndexRequest {
    string target = 1;                            // "tags", "fts", "sparse", "components", "all"
    optional string tenant_id = 2;                // Scope to tenant (empty = all tenants)
    optional string collection = 3;               // Collection (default: "projects")
    optional bool force = 4;                      // Force full rebuild (e.g. reassign all components, not just NULL)
}

// RebuildIndex Response
message RebuildIndexResponse {
    bool success = 1;
    string message = 2;                           // Human-readable result summary
    int64 duration_ms = 3;                        // Total rebuild time
    map<string, string> details = 4;              // Target-specific result details
}

// SendRefreshSignal Request
message RefreshSignalRequest {
    QueueType queue_type = 1;
    repeated string lsp_languages = 2;            // For TOOLS_AVAILABLE signal
    repeated string grammar_languages = 3;        // For TOOLS_AVAILABLE signal
}

// NotifyServerStatus Request
message ServerStatusNotification {
    ServerState state = 1;                        // UP or DOWN
    optional string project_name = 2;             // Git repo name or folder name
    optional string project_root = 3;             // [canonical] Absolute path to project root
}

// =============================================================================
// MESSAGE TYPES - CollectionService
// =============================================================================

// CreateCollection Request/Response
message CreateCollectionRequest {
    string collection_name = 1;
    string project_id = 2;                        // Optional project association
    CollectionConfig config = 3;                  // Vector configuration
}

message CreateCollectionResponse {
    bool success = 1;
    string error_message = 2;
    string collection_id = 3;                     // Qdrant's internal ID
}

message CollectionConfig {
    int32 vector_size = 1;                        // Must match embedding model (e.g., 384)
    string distance_metric = 2;                   // "Cosine", "Euclidean", "Dot"
    bool enable_indexing = 3;                     // HNSW index activation
    map<string, string> metadata_schema = 4;      // Expected metadata fields
}

// DeleteCollection Request
message DeleteCollectionRequest {
    string collection_name = 1;
    string project_id = 2;                        // For validation
    bool force = 3;                               // Skip confirmation checks
}

// CreateCollectionAlias Request
message CreateAliasRequest {
    string alias_name = 1;                        // The new name
    string collection_name = 2;                   // Points to this collection
}

// DeleteCollectionAlias Request
message DeleteAliasRequest {
    string alias_name = 1;
}

// RenameCollectionAlias Request
message RenameAliasRequest {
    string old_alias_name = 1;
    string new_alias_name = 2;
    string collection_name = 3;                   // The collection it points to
}

// ListCollections Response (spec: ListCollections)
message ListCollectionsResponse {
    repeated CollectionInfo collections = 1;
    int32 total_count = 2;
}

message CollectionInfo {
    string name = 1;                              // Collection name
    int64 vectors_count = 2;                      // Number of vectors
    int64 points_count = 3;                       // Number of points
    string status = 4;                            // "green", "yellow", "red"
    google.protobuf.Timestamp created_at = 5;
    repeated string aliases = 6;                  // Collection aliases
}

// GetCollection Request/Response (spec: GetCollection)
message GetCollectionRequest {
    string name = 1;                              // Collection name or alias
}

message GetCollectionResponse {
    bool found = 1;                               // Whether collection exists
    CollectionInfo info = 2;                      // Collection metadata
    CollectionConfig config = 3;                  // Collection configuration
}

// =============================================================================
// MESSAGE TYPES - DocumentService
// =============================================================================

// IngestText Request/Response
message IngestTextRequest {
    string content = 1;                           // The text to ingest
    string collection_basename = 2;               // e.g., "rules", "scratchbook"
    string tenant_id = 3;                         // Multi-tenant identifier
    optional string document_id = 4;              // Custom ID (generated if omitted)
    map<string, string> metadata = 5;             // Additional metadata
    bool chunk_text = 6;                          // Whether to chunk (default: true)
}

message IngestTextResponse {
    string document_id = 1;                       // For future updates/deletes
    bool success = 2;
    int32 chunks_created = 3;                     // Number of chunks generated
    string error_message = 4;
}

// UpdateDocument Request/Response (spec: UpdateDocument)
message UpdateDocumentRequest {
    string document_id = 1;                       // From IngestTextResponse
    string content = 2;                           // New content
    optional string collection_name = 3;          // If moving to different collection
    map<string, string> metadata = 4;             // Updated metadata
}

message UpdateDocumentResponse {
    bool success = 1;
    string error_message = 2;
    google.protobuf.Timestamp updated_at = 3;
}

// DeleteDocument Request (spec: DeleteDocument)
message DeleteDocumentRequest {
    string document_id = 1;
    string collection_name = 2;                   // For validation
}

// =============================================================================
// MESSAGE TYPES - EmbeddingService
// =============================================================================

// EmbedText Request
message EmbedTextRequest {
    string text = 1;                              // Text to embed
    optional string model = 2;                    // Model name (default: all-MiniLM-L6-v2)
}

// EmbedText Response
message EmbedTextResponse {
    repeated float embedding = 1;                 // Dense vector (384 dimensions)
    int32 dimensions = 2;                         // Vector dimension (384)
    string model_name = 3;                        // Model used for embedding
    bool success = 4;
    string error_message = 5;
}

// GenerateSparseVector Request
message SparseVectorRequest {
    string text = 1;                              // Text for sparse vector generation
}

// GenerateSparseVector Response
message SparseVectorResponse {
    map<uint32, float> indices_values = 1;        // Sparse vector: index → value
    int32 vocab_size = 2;                         // Current vocabulary size
    bool success = 3;
    string error_message = 4;
}

// =============================================================================
// MESSAGE TYPES - ProjectService
// =============================================================================

// RegisterProject Request/Response
message RegisterProjectRequest {
    string path = 1;                              // [canonical] Absolute path to project root
    string project_id = 2;                        // 12-char hex identifier
    optional string name = 3;                     // Human-readable project name
    optional string git_remote = 4;               // Git remote URL (for normalization)
    bool register_if_new = 5;                     // If false, only activate existing projects
    optional string priority = 6;                 // "high" or "normal"; defaults to "normal" if absent
}

message RegisterProjectResponse {
    bool created = 1;                             // True if new, false if existing
    string project_id = 2;                        // Confirmed project ID
    string priority = 3;                          // Current priority: "high", "normal", "low"
    bool is_active = 4;                           // Activity flag (spec-compliant boolean)
    bool newly_registered = 5;                    // True only if register_if_new was true and project was new
    bool is_worktree = 6;                         // True if registered as a worktree
    optional string watch_path = 7;               // [canonical] The actual registered watch path
}

// DeprioritizeProject Request/Response
message DeprioritizeProjectRequest {
    string project_id = 1;                        // 12-char hex identifier
    optional string watch_path = 2;               // [canonical] Absolute path to specific watch root
}

message DeprioritizeProjectResponse {
    bool success = 1;
    bool is_active = 2;                           // Activity flag after deactivation (spec-compliant boolean)
    string new_priority = 3;                      // Priority after demotion
}

// GetProjectStatus Request/Response
message GetProjectStatusRequest {
    string project_id = 1;                        // 12-char hex identifier
}

message GetProjectStatusResponse {
    bool found = 1;                               // Whether project exists
    string project_id = 2;
    string project_name = 3;
    string project_root = 4;                         // [canonical] Absolute project root
    string priority = 5;                          // "high", "normal", "low"
    bool is_active = 6;                           // Activity flag (spec-compliant boolean)
    google.protobuf.Timestamp last_active = 7;    // Last heartbeat/activity
    google.protobuf.Timestamp registered_at = 8;
    optional string git_remote = 9;
    bool is_worktree = 10;                        // True if this is a worktree watch root
    optional string main_worktree_path = 11;      // [canonical] Path to the main working tree (if worktree)
}

// ListProjects Request/Response
message ListProjectsRequest {
    optional string priority_filter = 1;          // Filter by priority: "high", "normal", "low", "all"
    bool active_only = 2;                         // Only return projects with is_active = true
}

message ListProjectsResponse {
    repeated ProjectInfo projects = 1;
    int32 total_count = 2;
}

message ProjectInfo {
    string project_id = 1;
    string project_name = 2;
    string project_root = 3;                         // [canonical] Absolute project root
    string priority = 4;
    bool is_active = 5;                           // Activity flag (spec-compliant boolean)
    google.protobuf.Timestamp last_active = 6;
    bool is_worktree = 7;                         // True if this is a worktree watch root
}

// Heartbeat Request/Response
message HeartbeatRequest {
    string project_id = 1;                        // 12-char hex identifier
}

message HeartbeatResponse {
    bool acknowledged = 1;                        // True if heartbeat was accepted
    google.protobuf.Timestamp next_heartbeat_by = 2;  // Deadline for next heartbeat
}

// RenameTenant Request/Response
message RenameTenantRequest {
    string old_tenant_id = 1;                     // Current tenant_id to rename
    string new_tenant_id = 2;                     // New tenant_id value
    repeated string collections = 3;              // Collections to update in Qdrant
}

message RenameTenantResponse {
    bool success = 1;
    int32 sqlite_rows_updated = 2;                // Number of SQLite rows affected
    string message = 3;                           // Human-readable status message
}

// DeleteProject Request/Response
message DeleteProjectRequest {
    string project_id = 1;                        // 12-char hex identifier
    bool delete_qdrant_data = 2;                  // Whether to delete vectors from Qdrant
}

message DeleteProjectResponse {
    bool success = 1;
    int32 watch_folders_deleted = 2;
    int32 tracked_files_deleted = 3;
    int32 qdrant_points_deleted = 4;
    int32 queue_items_deleted = 5;
    string message = 6;
}

// GetProjectGroups Request/Response
message GetProjectGroupsRequest {
    string tenant_id = 1;                         // Tenant to look up groups for
}

message GetProjectGroupsResponse {
    repeated ProjectGroupInfo groups = 1;         // Groups this tenant belongs to
    int32 total_members = 2;                      // Total unique members across all groups
}

message ProjectGroupInfo {
    string group_id = 1;                          // Group identifier
    string group_type = 2;                        // "dependency", "workspace", "git_org", "affinity"
    repeated string member_tenant_ids = 3;        // All tenants in this group
    double confidence = 4;                        // Group assignment confidence
}

// ResolveSearchScope Request/Response
message ResolveSearchScopeRequest {
    string tenant_id = 1;                         // Current project tenant_id
    string scope = 2;                             // "project", "group", or "all"
}

message ResolveSearchScopeResponse {
    repeated string tenant_ids = 1;               // Tenant IDs to include in search filter
    bool filter_by_tenant = 2;                    // false = no tenant filter (scope=all)
    repeated TenantDecay decay_map = 3;           // Per-tenant relevance decay multiplier
}

message TenantDecay {
    string tenant_id = 1;
    float multiplier = 2;                         // 1.0 = current, 0.7 = group, 0.4 = other
}

// -----------------------------------------------------------------------------
// 6. TextSearchService (2 RPCs)
// -----------------------------------------------------------------------------
// Purpose: FTS5-based code search with exact and regex matching.
// Use case: MCP server grep tool and enhanced search with line-level precision.

service TextSearchService {
    // Exact substring or regex search across code_lines
    rpc Search(TextSearchRequest) returns (TextSearchResponse);

    // Count matches without returning full results (fast overview)
    rpc CountMatches(TextSearchRequest) returns (TextSearchCountResponse);
}

// TextSearch Request
message TextSearchRequest {
    string pattern = 1;                           // Search pattern (exact string or regex)
    bool regex = 2;                               // If true, treat pattern as regex
    bool case_sensitive = 3;                      // Case-sensitive matching (default: true)
    optional string tenant_id = 4;                // Scope to project
    optional string branch = 5;                   // Scope to branch
    optional string path_glob = 6;               // [non-path] File path glob filter (e.g., "**/*.rs")
    optional string path_prefix = 7;             // [non-path] File path prefix filter (e.g., "src/")
    int32 context_lines = 8;                      // Lines of context before/after (0 = none)
    int32 max_results = 9;                        // Max results (0 = unlimited, default: 1000)
}

// TextSearch Response
message TextSearchResponse {
    repeated TextSearchMatch matches = 1;         // Matching lines
    int32 total_matches = 2;                      // Total matches found
    bool truncated = 3;                           // Whether results were truncated
    int64 query_time_ms = 4;                      // Query execution time in ms
}

// TextSearch CountMatches Response
message TextSearchCountResponse {
    int32 count = 1;                              // Number of matching lines
    int64 query_time_ms = 2;                      // Query execution time in ms
}

// A single text search match
message TextSearchMatch {
    string file_path = 1;                         // [relative] File path relative to project root
    int32 line_number = 2;                        // 1-based line number
    string content = 3;                           // Full content of matching line
    string tenant_id = 4;                         // Project tenant_id
    optional string branch = 5;                   // Branch name
    repeated string context_before = 6;           // Lines before the match
    repeated string context_after = 7;            // Lines after the match
}

// -----------------------------------------------------------------------------
// 7. GraphService (10 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Code relationship graph queries for traversal, impact analysis,
//          and statistics. Backed by SQLite graph.db with recursive CTEs.

service GraphService {
    // Query nodes related to a given node within N hops
    rpc QueryRelated(QueryRelatedRequest) returns (QueryRelatedResponse);

    // Impact analysis: find all nodes affected by changing a symbol
    rpc ImpactAnalysis(ImpactAnalysisRequest) returns (ImpactAnalysisResponse);

    // Graph statistics (node/edge counts by type)
    rpc GetGraphStats(GraphStatsRequest) returns (GraphStatsResponse);

    // Compute PageRank scores for graph nodes
    rpc ComputePageRank(PageRankRequest) returns (PageRankResponse);

    // Detect communities using label propagation
    rpc DetectCommunities(CommunityRequest) returns (CommunityResponse);

    // Compute betweenness centrality scores
    rpc ComputeBetweenness(BetweennessRequest) returns (BetweennessResponse);

    // Migrate graph data between backends (SQLite ↔ LadybugDB)
    rpc MigrateGraph(GraphMigrateRequest) returns (GraphMigrateResponse);

    // Find shortest path between two nodes
    rpc FindPath(FindPathRequest) returns (FindPathResponse);

    // Query narrative nodes linked to code symbols or concepts
    rpc NarrativeQuery(NarrativeQueryRequest) returns (NarrativeQueryResponse);

    // Cross-boundary RAG traversal across tenants via concept/narrative edges
    rpc QueryCrossBoundary(QueryCrossBoundaryRequest) returns (QueryCrossBoundaryResponse);
}

// QueryRelated Request
message QueryRelatedRequest {
    string tenant_id = 1;                         // Project tenant_id
    string node_id = 2;                           // Node ID to query from
    uint32 max_hops = 3;                          // Max traversal depth (1-5)
    repeated string edge_types = 4;               // Filter: ["CALLS", "IMPORTS"], empty = all
    optional string branch = 5;                    // Scope to branch (empty/"*" = all)
}

// QueryRelated Response
message QueryRelatedResponse {
    repeated TraversalNodeProto nodes = 1;        // Related nodes with path context
    uint32 total = 2;                             // Total related nodes found
    int64 query_time_ms = 3;                      // Query execution time in ms
}

// A node discovered during graph traversal
message TraversalNodeProto {
    string node_id = 1;
    string symbol_name = 2;
    string symbol_type = 3;                       // NodeType as string (e.g., "function")
    string file_path = 4;                             // [relative] Relative to project root
    string edge_type = 5;                         // EdgeType as string (e.g., "CALLS")
    uint32 depth = 6;                             // Hops from source node
    string path = 7;                              // [non-path] Traversal path description
    string tenant_id = 8;                         // Tenant of the reached node
    double edge_confidence = 9;                   // Confidence of reaching edge (1.0 = structural)
}

// QueryCrossBoundary Request
message QueryCrossBoundaryRequest {
    string source_tenant = 1;                     // Querying project tenant_id
    string source_node_id = 2;                    // Node ID to traverse from
    repeated string edge_types = 3;               // Concept/narrative edge filter
    uint32 max_hops = 4;                          // Traversal depth (clamped 1-3)
    repeated string library_tenants = 5;          // Library tenants to relax in
    bool two_sided_confidence = 6;                // Require both-side concept edges
}

// QueryCrossBoundary Response
message QueryCrossBoundaryResponse {
    repeated TraversalNodeProto nodes = 1;        // Reached cross-boundary nodes
    uint32 total = 2;                             // Total nodes returned
    int64 query_time_ms = 3;                      // Query execution time in ms
}

// ImpactAnalysis Request
message ImpactAnalysisRequest {
    string tenant_id = 1;                         // Project tenant_id
    string symbol_name = 2;                       // Symbol to analyze
    optional string file_path = 3;                // [relative] Narrow to specific file (relative path)
    optional string branch = 4;                    // Scope to branch (empty/"*" = all)
}

// ImpactAnalysis Response
message ImpactAnalysisResponse {
    repeated ImpactNodeProto impacted_nodes = 1;
    uint32 total_impacted = 2;
    int64 query_time_ms = 3;                      // Query execution time in ms
}

// A node impacted by a symbol change
message ImpactNodeProto {
    string node_id = 1;
    string symbol_name = 2;
    string file_path = 3;                             // [relative] Relative to project root
    string impact_type = 4;                       // "direct_caller", "indirect_caller", etc.
    uint32 distance = 5;                          // Hops from changed symbol
}

// GraphStats Request
message GraphStatsRequest {
    optional string tenant_id = 1;                // Empty = all tenants
    optional string branch = 2;                    // Scope to branch (empty/"*" = all)
}

// GraphStats Response
message GraphStatsResponse {
    uint64 total_nodes = 1;
    uint64 total_edges = 2;
    map<string, uint64> nodes_by_type = 3;        // {"function": 1234, "class": 567}
    map<string, uint64> edges_by_type = 4;        // {"CALLS": 5678, "IMPORTS": 234}
}

// PageRank Request
message PageRankRequest {
    string tenant_id = 1;                         // Project tenant_id
    optional double damping = 2;                  // Damping factor (default: 0.85)
    optional uint32 max_iterations = 3;           // Max iterations (default: 100)
    optional double tolerance = 4;                // Convergence threshold (default: 1e-6)
    repeated string edge_types = 5;               // Filter edges; empty = all
    optional uint32 top_k = 6;                    // Return only top K results (0 = all)
}

// PageRank Response
message PageRankResponse {
    repeated PageRankNodeProto entries = 1;
    uint32 total = 2;
    int64 query_time_ms = 3;
}

// A PageRank score for a node
message PageRankNodeProto {
    string node_id = 1;
    string symbol_name = 2;
    string symbol_type = 3;
    string file_path = 4;                             // [relative] Relative to project root
    double score = 5;
}

// Community Detection Request
message CommunityRequest {
    string tenant_id = 1;
    optional uint32 max_iterations = 2;           // Label propagation iterations (default: 50)
    optional uint32 min_community_size = 3;       // Min members to include (default: 2)
    repeated string edge_types = 4;               // Filter edges; empty = all
}

// Community Detection Response
message CommunityResponse {
    repeated CommunityProto communities = 1;
    uint32 total_communities = 2;
    int64 query_time_ms = 3;
}

// A detected community
message CommunityProto {
    uint32 community_id = 1;
    repeated CommunityMemberProto members = 2;
}

// A member of a community
message CommunityMemberProto {
    string node_id = 1;
    string symbol_name = 2;
    string symbol_type = 3;
    string file_path = 4;                             // [relative] Relative to project root
}

// Betweenness Centrality Request
message BetweennessRequest {
    string tenant_id = 1;
    repeated string edge_types = 2;               // Filter edges; empty = all
    optional uint32 max_samples = 3;              // Sample sources for large graphs (0 = all)
    optional uint32 top_k = 4;                    // Return only top K results (0 = all)
}

// Betweenness Centrality Response
message BetweennessResponse {
    repeated BetweennessNodeProto entries = 1;
    uint32 total = 2;
    int64 query_time_ms = 3;
}

// A betweenness centrality score for a node
message BetweennessNodeProto {
    string node_id = 1;
    string symbol_name = 2;
    string symbol_type = 3;
    string file_path = 4;                             // [relative] Relative to project root
    double score = 5;
}

// Graph Migration Request
message GraphMigrateRequest {
    string from_backend = 1;                      // "sqlite" or "ladybug"
    string to_backend = 2;                        // "sqlite" or "ladybug"
    optional string tenant_id = 3;                // Migrate specific tenant (empty = all)
    optional uint32 batch_size = 4;               // Import batch size (default: 500)
}

// Graph Migration Response
message GraphMigrateResponse {
    bool success = 1;
    uint64 nodes_exported = 2;
    uint64 edges_exported = 3;
    uint64 nodes_imported = 4;
    uint64 edges_imported = 5;
    bool nodes_match = 6;
    bool edges_match = 7;
    repeated string warnings = 8;
}

// FindPath Request
message FindPathRequest {
    string tenant_id = 1;                         // Project tenant_id
    string source_node_id = 2;                    // Starting node ID
    string target_node_id = 3;                    // Destination node ID
    uint32 max_depth = 4;                         // Max path length (1-10)
    repeated string edge_types = 5;               // Filter edge types, empty = all
    optional string branch = 6;                    // Scope to branch (empty/"*" = all)
}

// FindPath Response
message FindPathResponse {
    bool path_found = 1;
    repeated TraversalNodeProto path_nodes = 2;   // Ordered nodes along the path
    uint32 path_length = 3;                       // Number of hops in path
    int64 query_time_ms = 4;                      // Query execution time in ms
}

// NarrativeQuery Request
message NarrativeQueryRequest {
    string tenant_id = 1;                         // Project tenant_id
    oneof query_target {
        string symbol_name = 2;                   // Code symbol to find narrative for
        string concept_name = 3;                  // Concept node name to traverse from
    }
    repeated string edge_types = 4;               // Filter by edge type (e.g., "EXPLAINS", "COVERS_TOPIC")
    int32 max_depth = 5;                          // Default 2, clamped 1..=5
    int32 max_results = 6;                        // Default 50, clamped 1..=200
}

// NarrativeQuery Response
message NarrativeQueryResponse {
    repeated NarrativeNode nodes = 1;             // Matching narrative nodes
    int32 total_found = 2;                        // Total narrative nodes found
}

// A narrative node linked to a code symbol or concept
message NarrativeNode {
    string node_id = 1;
    string symbol_name = 2;
    string symbol_type = 3;                       // NodeType as string
    string file_path = 4;                         // [relative] Relative to project root
    string edge_type = 5;                         // EdgeType as string
    int32 depth = 6;                              // Hops from source node
    string path = 7;                              // [non-path] Traversal path description
    optional string metadata_json = 8;            // Edge metadata (e.g., depth level)
}

// -----------------------------------------------------------------------------
// 7b. LanguageService (5 RPCs)  [#82 WI-e1]
// -----------------------------------------------------------------------------
// Purpose: tree-sitter grammar lifecycle + language-registry queries for the
//          CLI (`wqm language …`). The grammar engine (download / compile /
//          dlopen) stays daemon-side; clients call these RPCs instead of
//          linking workspace-qdrant-core. InstallGrammar validates the language
//          name against the registry allowlist, rejects path/URL metacharacters,
//          requires an https pinned source, and verifies checksums before any
//          compile/dlopen (handlers delegate the gate to core::language_registry).

service LanguageService {
    // Install (download + compile + load) a grammar for a language.
    rpc InstallGrammar(InstallGrammarRequest) returns (InstallGrammarResponse);

    // Remove a cached grammar (and metadata) for a language.
    rpc RemoveGrammar(RemoveGrammarRequest) returns (RemoveGrammarResponse);

    // List cached and known grammars.
    rpc ListGrammars(google.protobuf.Empty) returns (ListGrammarsResponse);

    // Query a single language's definition + grammar status.
    rpc QueryLanguage(QueryLanguageRequest) returns (QueryLanguageResponse);

    // Refresh the language registry and return summary counts.
    rpc RefreshLanguageRegistry(google.protobuf.Empty) returns (RefreshLanguageRegistryResponse);
}

message InstallGrammarRequest {
    string language = 1;   // Canonical language name (must be in registry allowlist)
    bool force = 2;        // Re-download even if already cached
}

message InstallGrammarResponse {
    string language = 1;
    string status = 2;     // GrammarStatus as string (e.g. "loaded", "cached")
    bool installed = 3;    // True if a (re)install actually happened
    string message = 4;
}

message RemoveGrammarRequest {
    string language = 1;
}

message RemoveGrammarResponse {
    string language = 1;
    bool removed = 2;      // True if a cached grammar file was removed
}

// A known grammar and its current cache status.
message GrammarEntryProto {
    string language = 1;
    string status = 2;     // GrammarStatus as string
}

message ListGrammarsResponse {
    repeated string cached = 1;            // Languages with an on-disk cached grammar
    repeated GrammarEntryProto known = 2;  // Registry languages with grammar support + status
}

message QueryLanguageRequest {
    string language = 1;
}

message QueryLanguageResponse {
    bool found = 1;                  // Language present in the registry allowlist
    string language = 2;             // Canonical name
    string grammar_status = 3;       // GrammarStatus as string
    bool has_grammar = 4;
    bool has_lsp = 5;
    bool has_semantic_patterns = 6;
    repeated string extensions = 7;
    repeated string aliases = 8;
}

message RefreshLanguageRegistryResponse {
    uint32 total = 1;
    uint32 with_grammars = 2;
    uint32 with_lsp = 3;
    uint32 with_semantic_patterns = 4;
}

// -----------------------------------------------------------------------------
// 8. QueueWriteService (6 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Queue item lifecycle mutations. Daemon-exclusive writes to
//          unified_queue table. CLI and MCP server use these RPCs instead
//          of direct SQLite writes.

service QueueWriteService {
    // Enqueue a new item (store, rules, library ingest, etc.)
    rpc EnqueueItem(EnqueueItemRequest) returns (EnqueueItemResponse);

    // Reset all failed items to pending
    rpc RetryAll(google.protobuf.Empty) returns (RetryAllResponse);

    // Reset a single failed item to pending (exact or prefix match)
    rpc RetryItem(RetryItemRequest) returns (RetryItemResponse);

    // Delete old completed/failed items by age
    rpc CleanQueue(CleanQueueRequest) returns (CleanQueueResponse);

    // Delete pending/failed items for a tenant (bulk cancel)
    rpc CancelItems(CancelItemsRequest) returns (CancelItemsResponse);

    // Delete a single queue item by ID (exact, prefix, or idempotency key)
    rpc RemoveItem(RemoveItemRequest) returns (RemoveItemResponse);

    // Delete pending/failed queue items by collection(s)
    rpc CleanQueueByCollection(CleanQueueByCollectionRequest) returns (CleanQueueResponse);

    // Replay a DLQ item back into the queue (force=true overrides permanent_data guard)
    rpc ReplayDlqItem(ReplayDlqItemRequest) returns (ReplayDlqItemResponse);

    // Purge expired DLQ entries by retention policy
    rpc PurgeDlq(PurgeDlqRequest) returns (PurgeDlqResponse);
}

// -----------------------------------------------------------------------------
// 9. WatchWriteService (6 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Watch folder state mutations. Daemon-exclusive writes to
//          watch_folders table.

service WatchWriteService {
    // Pause all enabled watchers (set is_paused=1)
    rpc PauseWatchers(google.protobuf.Empty) returns (WatchMutationResponse);

    // Resume all paused watchers (set is_paused=0)
    rpc ResumeWatchers(google.protobuf.Empty) returns (WatchMutationResponse);

    // Enable a specific watch folder
    rpc EnableWatch(WatchIdRequest) returns (WatchMutationResponse);

    // Disable a specific watch folder
    rpc DisableWatch(WatchIdRequest) returns (WatchMutationResponse);

    // Archive a watch folder (with optional submodule cascade)
    rpc ArchiveWatch(ArchiveWatchRequest) returns (ArchiveWatchResponse);

    // Unarchive a watch folder
    rpc UnarchiveWatch(WatchIdRequest) returns (WatchMutationResponse);
}

// -----------------------------------------------------------------------------
// 10. LibraryWriteService (6 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Library management mutations. Daemon-exclusive writes to
//          watch_folders, tracked_files, project_components, unified_queue.

service LibraryWriteService {
    // Add a new library (insert watch_folders entry, enabled=0)
    rpc AddLibrary(AddLibraryRequest) returns (AddLibraryResponse);

    // Remove a library (atomic delete: queue items, components, tracked files, watch folder)
    rpc RemoveLibrary(RemoveLibraryRequest) returns (RemoveLibraryResponse);

    // Enable watching on a library path (create or update watch entry)
    rpc WatchLibrary(WatchLibraryRequest) returns (WatchLibraryResponse);

    // Disable watching on a library
    rpc UnwatchLibrary(UnwatchLibraryRequest) returns (WatchMutationResponse);

    // Update library configuration (mode, enable/disable)
    rpc ConfigureLibrary(ConfigureLibraryRequest) returns (WatchMutationResponse);

    // Set or clear incremental flag on tracked files
    rpc SetIncremental(SetIncrementalRequest) returns (SetIncrementalResponse);
}

// -----------------------------------------------------------------------------
// 11. TrackingWriteService (4 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Observability and mirror mutations. Daemon-exclusive writes to
//          search_events and rules_mirror tables.

service TrackingWriteService {
    // Log a search event (initial record at search start)
    rpc LogSearchEvent(LogSearchEventRequest) returns (google.protobuf.Empty);

    // Update a search event with post-search results
    rpc UpdateSearchEvent(UpdateSearchEventRequest) returns (google.protobuf.Empty);

    // Upsert a rule into the rules_mirror table
    rpc UpsertRuleMirror(UpsertRuleMirrorRequest) returns (google.protobuf.Empty);

    // Delete a rule from the rules_mirror table
    rpc DeleteRuleMirror(DeleteRuleMirrorRequest) returns (google.protobuf.Empty);

    // Upsert a scratchpad entry into the scratchpad_mirror table
    rpc UpsertScratchpadMirror(UpsertScratchpadMirrorRequest) returns (google.protobuf.Empty);

    // Delete a scratchpad entry from the scratchpad_mirror table
    rpc DeleteScratchpadMirror(DeleteScratchpadMirrorRequest) returns (google.protobuf.Empty);
}

// -----------------------------------------------------------------------------
// 12. AdminWriteService (2 RPCs)
// -----------------------------------------------------------------------------
// Purpose: Administrative mutations spanning multiple tables.
//          Daemon-exclusive writes.

service AdminWriteService {
    // Rename tenant_id across watch_folders, unified_queue, tracked_files
    rpc RenameTenantAdmin(RenameTenantAdminRequest) returns (RenameTenantAdminResponse);

    // Update corpus_statistics after IDF rebalancing
    rpc RebalanceIdf(RebalanceIdfRequest) returns (RebalanceIdfResponse);

    // Trigger full re-embed pipeline (drain queue, recreate canonical
    // collections at settings.output_dim, re-enqueue all indexed sources).
    rpc TriggerReembed(TriggerReembedRequest) returns (TriggerReembedResponse);
}

