# Bundled language registry for workspace-qdrant-mcp.
#
# This file defines all known languages with their grammar sources,
# semantic extraction patterns, and LSP server configurations.
# It serves as the offline fallback when no network providers are available.
#
# Quality tiers:
#   official  - from the tree-sitter org or language maintainers
#   curated   - from tree-sitter-grammars org
#   community - community-maintained

# ── Ada ──────────────────────────────────────────────────────────────

- language: ada
  aliases: []
  extensions: [".adb", ".ads"]
  type: programming
  grammar:
    sources:
      - repo: briot/tree-sitter-ada
        quality: community
    has_cpp_scanner: false
  semantic_patterns:
    preamble:
      node_types: [with_clause, use_clause]
    function:
      node_types: [subprogram_body, subprogram_declaration]
      async_node_types: []
    class:
      node_types: []
    method:
      node_types: []
    struct:
      node_types: []
    enum:
      node_types: []
    trait:
      node_types: []
    interface:
      node_types: []
    module:
      node_types: [package_body, package_declaration]
    constant:
      node_types: []
    macro:
      node_types: []
    type_alias:
      node_types: []
    impl:
      node_types: []
    name_node: identifier
    body_node: non_empty_declarative_part
    comment_nodes: [comment]
    docstring_style: preceding_comments
    root_wrappers: [compilation_unit]
  lsp_servers: []

# ── Bash ─────────────────────────────────────────────────────────────

- language: bash
  aliases: [shell, sh, zsh]
  extensions: [".sh", ".bash", ".zsh"]
  type: programming
  grammar:
    sources:
      - repo: tree-sitter/tree-sitter-bash
        quality: official
    has_cpp_scanner: false
  semantic_patterns:
    preamble:
      node_types: [comment, command, variable_assignment]
    function:
      node_types: [function_definition]
      async_node_types: []
    class:
      node_types: []
    method:
      node_types: []
    struct:
      node_types: []
    enum:
      node_types: []
    trait:
      node_types: []
    interface:
      node_types: []
    module:
      node_types: []
    constant:
      node_types: []
    macro:
      node_types: []
    type_alias:
      node_types: []
    impl:
      node_types: []
    name_node: word
    comment_nodes: [comment]
    docstring_style: preceding_comments
  lsp_servers:
    - name: bash-language-server
      binary: bash-language-server
      args: [start]
      priority: 1
      install_methods:
        - manager: npm
          command: "npm install -g bash-language-server"

# ── C ────────────────────────────────────────────────────────────────

- language: c
  aliases: []
  extensions: [".c", ".h"]
  type: programming
  grammar:
    sources:
      - repo: tree-sitter/tree-sitter-c
        quality: official
    has_cpp_scanner: false
  semantic_patterns:
    preamble:
      node_types: [preproc_include, preproc_def, preproc_ifdef, preproc_ifndef]
    function:
      node_types: [function_definition]
      async_node_types: []
    class:
      node_types: []
    method:
      node_types: []
    struct:
      node_types: [struct_specifier, type_definition]
    enum:
      node_types: [enum_specifier]
    trait:
      node_types: []
    interface:
      node_types: []
    module:
      node_types: []
    constant:
      node_types: []
    macro:
      node_types: []
    type_alias:
      node_types: []
    impl:
      node_types: []
    name_node: identifier
    body_node: compound_statement
    comment_nodes: [comment]
    docstring_style: preceding_comments
  lsp_servers:
    - name: clangd
      binary: clangd
      args: []
      priority: 1
      install_methods:
        - manager: brew
          command: "brew install llvm"
        - manager: apt
          command: "apt install clangd"
    - name: ccls
      binary: ccls
      args: []
      priority: 2
      install_methods:
        - manager: brew
          command: "brew install ccls"

