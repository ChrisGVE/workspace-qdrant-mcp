[package]
name = "wqm-proto"
version = "0.1.3"
edition = "2021"
description = "Shared gRPC client stubs generated from workspace_daemon.proto"

[dependencies]
tonic = { version = "0.12", features = ["tls", "tls-roots"] }
prost = "0.13"
prost-types = "0.13"

[build-dependencies]
tonic-build = { workspace = true }
