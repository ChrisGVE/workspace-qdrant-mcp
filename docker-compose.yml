# workspace-qdrant-mcp unified compose stack.
#
# One command starts the complete local stack from the repository root:
#   docker compose up -d --build
#
# Optional profiles:
#   --profile tls         -> Caddy reverse proxy for MCP over HTTPS
#   --profile embeddings-cpu  -> CPU embedding backend (TEI, e5-large)
#   --profile embeddings-gpu  -> GPU embedding backend (Infinity, e5-large; needs NVIDIA toolkit)
#
# FastEmbed defaults:
#   memexd starts with WQM_EMBEDDING_PROVIDER=fastembed and keeps its
#   model cache in ./.fastembed_cache so local runs do not need an API key.
#
# Required environment variables:
#   MCP_HTTP_TOKEN   -> Bearer token for the MCP HTTP endpoint
#   WQM_DEV_ROOT     -> Absolute host path for the projects you want indexed

name: workspace-qdrant-mcp

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-restart: &restart
  # 'always' (nao 'unless-stopped') garante que os containers subam toda vez que
  # o Docker daemon iniciar, mesmo se foram parados manualmente ou se houve
  # shutdown sujo do Docker Desktop. Removeu a necessidade de 'docker compose up'
  # apos cada start do Docker Desktop.
  restart: always

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

# ─────────────────────────────────────────────────────────────────────────────

services:
  # ───────────────────────────────────────────────
  # Qdrant - vector database
  # ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-latest}
    container_name: wqm-qdrant
    <<: *restart
    logging: *default-logging
    # The wrapper auto-quarantines corrupted collection segments after dirty
    # shutdowns (e.g. host reboot mid-write). Without it, Qdrant panics on
    # `Failed to load local shard` and the `restart: always` policy retries
    # forever, blocking every container that has `depends_on: qdrant healthy`.
    # See docker/qdrant-quarantine-wrapper.sh.
    entrypoint: ["/usr/local/bin/qdrant-quarantine-wrapper.sh"]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${WQM_STATE_DIR:-./state}/qdrant/storage:/qdrant/storage
      - ${WQM_STATE_DIR:-./state}/qdrant/snapshots:/qdrant/snapshots
      - ./docker/qdrant-quarantine-wrapper.sh:/usr/local/bin/qdrant-quarantine-wrapper.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 3
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # memexd - Rust daemon
  # ───────────────────────────────────────────────
  memexd:
    # Build from this checkout so the daemon always matches the branch we are
    # testing instead of a stale published image.
    build:
      context: .
      dockerfile: docker/Dockerfile.memexd
    image: workspace-qdrant-mcp-memexd:local
    container_name: wqm-memexd
    # Explicit command override: the entrypoint VALIDATES /etc/wqm/config.yaml
    # but memexd only READS it when --config is passed. Without this the daemon
    # auto-discovers nothing and silently runs on built-in defaults + env — a
    # latent misconfig masked for months by the fastembed env pinning forcing
    # 384d (surfaced 2026-06-10 during the e5-1024d migration as a dim guard
    # comparing the built-in 1536 default instead of the configured 1024).
    command:
      - "--foreground"
      - "--grpc-port"
      - "50051"
      - "--metrics-port"
      - "9091"
      - "--config"
      - "/etc/wqm/config.yaml"
    # PID 1 init reaper: memexd spawns LSP servers, grammar downloads and git
    # subprocesses as children. Without an init, dead children become unreapable
    # zombies under PID 1 — they accumulate and eventually wedge the container so
    # Docker cannot even stop it ("PID <n> is zombie and can not be killed").
    init: true
    # NOTE: a hard `mem_limit` (cgroup memory.max) is intentionally NOT set here.
    # The runaway memory is page cache from heavy indexing I/O — and Linux page
    # cache ALWAYS grows to fill whatever memory.max you give it, then trips the
    # cgroup "oom" pressure event (oom_kill=0, it's reclaimable cache), which
    # Docker turns into a container restart → a ~40s restart loop. RSS (anon)
    # stays <2GB, so a per-container cap is the wrong tool. Host protection lives
    # at the WSL2 layer instead: ~/.wslconfig caps the VM (memory=80GB) and
    # autoMemoryReclaim returns idle cache to Windows, so cache can grow/reclaim
    # freely inside the VM without starving the host. The real reduction is a
    # narrower watch scope (see WQM_DEV_ROOT / active projects).
    <<: *restart
    logging: *default-logging
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "${MEMEXD_GRPC_PORT:-50051}:50051"
      - "${MEMEXD_METRICS_PORT:-9091}:9091"
    volumes:
      # Bind-mount for flat-file daemon state (config.yaml, global.wqmignore,
      # docker-compose-wqm.override.yaml, .fastembed_cache, recovery backups).
      # SQLite DBs do NOT live here — see memexd_db named volume below for why.
      - ${WQM_STATE_DIR:-./state}/memexd:/home/memexd/.workspace-qdrant
      # Optional runtime config override. Defaults to a local state file.
      - ${WQM_CONFIG_FILE:-./state/memexd/config.yaml}:/etc/wqm/config.yaml:ro
      - ${WQM_OVERRIDE_FILE:-./state/memexd/docker-compose-wqm.override.yaml}:/etc/docker-compose-wqm.override.yaml:ro
      # FastEmbed model cache in the legacy workspace-qdrant layout.
      - ${WQM_FASTEMBED_CACHE_DIR:-./.fastembed_cache}:/home/memexd/.workspace-qdrant/models
      # Keep recorded paths identical between host and container.
      - ${WQM_DEV_ROOT:?Set WQM_DEV_ROOT in .env to your dev root absolute path}:${WQM_DEV_ROOT}
      # SQLite DBs on a Docker named volume (ext4 native in the WSL2 VM).
      # Docker Desktop's 9P/drvfs bind-mount cannot satisfy SQLite WAL's
      # mmap/locking requirements when SQLx initialises a DB with
      # mmap_size=256MB — every fresh-open returns SQLITE_CANTOPEN.
      # memexd.db, search.db, graph.db all live in this volume.
      - memexd_db:/var/lib/memexd
      # global.wqmignore lookup follows `dirname(WQM_DATABASE_PATH)`. The
      # admin UI writes the editable copy to state/memexd/global.wqmignore;
      # bind-mounting it into /var/lib/memexd/ keeps both views in sync.
      - ${WQM_STATE_DIR:-./state}/memexd/global.wqmignore:/var/lib/memexd/global.wqmignore
    environment:
      QDRANT_URL: http://qdrant:6334
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WQM_LOG_LEVEL: ${WQM_LOG_LEVEL:-INFO}
      WQM_EMBEDDING_PROVIDER: ${WQM_EMBEDDING_PROVIDER:-fastembed}
      # Throughput tuning for first-index / cold-start. The defaults in
      # UnifiedProcessorConfig::default() ship conservative (2 concurrent
      # embeddings, 50ms inter-item delay, 30s warmup window) which caps the
      # queue at ~600 docs/min on a multi-core box. The values below push the
      # queue processor toward `target_throughput: 1000` docs/min. Reduce them
      # if WQM_MAX_RSS_MB pressure causes the processor to pause.
      WQM_RESOURCE_MAX_CONCURRENT_EMBEDDINGS: ${WQM_RESOURCE_MAX_CONCURRENT_EMBEDDINGS:-8}
      WQM_RESOURCE_ONNX_INTRA_THREADS: ${WQM_RESOURCE_ONNX_INTRA_THREADS:-4}
      WQM_RESOURCE_INTER_ITEM_DELAY_MS: ${WQM_RESOURCE_INTER_ITEM_DELAY_MS:-0}
      # CPU-pressure throttle threshold: loadavg(1m)/physical_cores > threshold.
      # sysinfo reports physical_cores=8 inside WSL (SMT halves the 16 logical
      # cores), so the 0.6 default trips at loadavg>4.8 — a false positive that
      # engages the adaptive 25ms inter-item delay and caps embedding throughput.
      # Default 1.2 (=0.6*16/8) restores the intended 60%-of-16-cores trigger.
      WQM_RESOURCE_CPU_PRESSURE_THRESHOLD: ${WQM_RESOURCE_CPU_PRESSURE_THRESHOLD:-1.2}
      WQM_QUEUE_BATCH_SIZE: ${WQM_QUEUE_BATCH_SIZE:-32}
      WQM_QUEUE_POLL_INTERVAL_MS: ${WQM_QUEUE_POLL_INTERVAL_MS:-100}
      # Item-level dispatch concurrency within a batch. `1` is byte-identical
      # to the legacy sequential loop — items dispatch one at a time, so ONE
      # slow item (slow embed / DB-write contention) stalls the whole queue for
      # minutes (observed 2026-05-31: oscillating drain↔wedge during a large
      # reconcile, search_eval timing out mid-wedge). Bumped to `4` (the
      # compose-recommended bake target) so a slow item no longer blocks the
      # others. Watch `database is locked` rates; dial back toward 2 if WAL
      # contention worsens.
      WQM_QUEUE_MAX_CONCURRENT_ITEMS: ${WQM_QUEUE_MAX_CONCURRENT_ITEMS:-4}
      # Warmup throttling: keep the window short so the daemon reaches steady
      # state quickly, but don't disable it entirely — FastEmbed first-load
      # still benefits from a brief ramp.
      WQM_STARTUP_WARMUP_DELAY_SECS: ${WQM_STARTUP_WARMUP_DELAY_SECS:-0}
      WQM_STARTUP_WARMUP_WINDOW_SECS: ${WQM_STARTUP_WARMUP_WINDOW_SECS:-5}
      WQM_STARTUP_MAX_CONCURRENT_EMBEDDINGS: ${WQM_STARTUP_MAX_CONCURRENT_EMBEDDINGS:-4}
      # Process-RSS safety valve (queue processor pauses when exceeded).
      # Bumped 4096 -> 8192 (2026-05-31): the LSP enrichment cache
      # (project_manager::cache) was unbounded and grew the daemon heap to
      # ~4.7GB during a full reconcile, so the 4096 guard fired from near-boot
      # and starved indexing for ALL projects. The real fix is bounding that
      # cache (LRU); 8192 is interim headroom on a 108GB host. Once the cache
      # is bounded, baseline RSS drops well below this again.
      WQM_MAX_RSS_MB: ${WQM_MAX_RSS_MB:-8192}
      # FTS5 batch-mode kill switch for oversize files. When > 0, the
      # FtsBatchProcessor falls back to single-file mode whenever ANY
      # pending FileChange has more lines than this threshold — even
      # at high queue depth that would otherwise pick batch mode.
      # Protects RSS from spikes caused by one giant file (e.g. 600k-line
      # generated CSV/log) landing in the same batch window as dozens of
      # small source files, because batch mode loads every diff into RAM
      # upfront before opening the SQLite transaction. 0 (default) keeps
      # the original queue-depth-only behavior. Suggested starting value
      # when enabling: 10000.
      WQM_FTS5_SINGLE_MODE_THRESHOLD: ${WQM_FTS5_SINGLE_MODE_THRESHOLD:-0}
      # FTS5 HARD CAP: files with more lines than this are excluded from
      # code_lines / FTS5 ingestion entirely. file_metadata still gets
      # written with fts5_skipped=1 (visible in admin UI / Grafana). The
      # semantic-embedding pipeline is bounded separately and processes
      # the file normally — only the line-level grep index is skipped.
      # 0 (default) disables the cap. Suggested starting value when
      # enabling: 100000 (~5MB at 50 chars/line — covers most legitimate
      # source files, drops CSV dumps / generated proto / lockfiles).
      WQM_FTS5_HARD_CAP: ${WQM_FTS5_HARD_CAP:-0}
      # Daemon DB lives on the memexd_db named volume — see volumes section
      # above. Bind-mount on Docker Desktop 9P breaks SQLite WAL.
      WQM_DATABASE_PATH: /var/lib/memexd/memexd.db
      WQM_EMBEDDING_MODEL_CACHE_DIR: /home/memexd/.workspace-qdrant/models
      HF_HOME: /home/memexd/.workspace-qdrant/models
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # Trust bind-mounted host repos. Same pattern as wqm-mcp — git CLI under
      # a different uid would otherwise reject the worktree as 'dubious
      # ownership', leaving the daemon unable to detect branches.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      # Cold start: FastEmbed pode baixar/carregar modelo na primeira execucao.
      start_period: 90s
      retries: 5
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # MCP - TypeScript server (Streamable HTTP)
  # ───────────────────────────────────────────────
  mcp:
    image: ${MCP_IMAGE:-workspace-qdrant-mcp:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wqm-mcp
    <<: *restart
    logging: *default-logging
    depends_on:
      memexd:
        condition: service_healthy
    ports:
      - "${MCP_HTTP_PORT:-6335}:6335"
      - "${MCP_METRICS_PORT:-9092}:9092"
    volumes:
      # Persistent MCP state; logs are written under logs/ inside this volume.
      - ${WQM_STATE_DIR:-./state}/mcp:/home/node/.local/share/workspace-qdrant
      # Mirror WQM_DEV_ROOT so the MCP server can shell out to `git` and read
      # the same project tree the daemon watches. Identical path on host and
      # container preserves the path-transparency invariant (spec 16).
      - ${WQM_DEV_ROOT}:${WQM_DEV_ROOT}
      # Shared view into the daemon's state directory. The admin UI
      # (and any other read-only consumer in the MCP server) needs the
      # *same* SQLite file the daemon writes — otherwise project lists
      # and queue stats return empty even when the daemon has data.
      #
      # NOTE: mounted read-write at the filesystem layer because SQLite
      # WAL mode requires the writer-created `-shm` file to be openable
      # (even readers touch shared-memory mapping). The TypeScript
      # client opens the handle with `{ readonly: true }` which still
      # honors ADR-003's "daemon is the sole SQLite writer" invariant
      # at the SQL layer.
      - ${WQM_STATE_DIR:-./state}/memexd:/var/lib/wqm/memexd
      # The daemon writes memexd.db to the memexd_db named volume (ext4 in the
      # WSL2 VM — Docker Desktop's 9P bind-mount breaks SQLite WAL). The bind
      # mount above does NOT contain memexd.db (only stale graph/search/state
      # copies from an older layout), so mount the same named volume here and
      # point WQM_DATABASE_PATH at it. Without this, project auto-detection
      # opens a missing memexd.db -> degraded handle -> empty watch_folders ->
      # every CWD lookup returns "Could not detect project". Shared RW + WAL is
      # safe for a concurrent reader (better-sqlite3 opens with readonly:true).
      - memexd_db:/var/lib/memexd
      # Overlay the editable global ignore on top of the named volume so the
      # admin UI (served by THIS mcp container) reads/writes the SAME file the
      # daemon uses. dirname(WQM_DATABASE_PATH) = /var/lib/memexd, which is the
      # named volume here — its global.wqmignore is an empty 0-byte copy. Without
      # this bind the admin UI shows a blank "Global index exclusions" panel and
      # any Save writes to the dead volume copy, never reaching the daemon (which
      # reads the bind). Mirrors the memexd service's global.wqmignore bind.
      - ${WQM_STATE_DIR:-./state}/memexd/global.wqmignore:/var/lib/memexd/global.wqmignore
    environment:
      MCP_SERVER_MODE: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-6335}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
      MCP_HTTP_TOKEN: ${MCP_HTTP_TOKEN:?Set MCP_HTTP_TOKEN in .env and generate it with `openssl rand -hex 32`}
      MCP_METRICS_HOST: 0.0.0.0
      MCP_METRICS_TOKEN: ${MCP_HTTP_TOKEN:?Set MCP_HTTP_TOKEN in .env and reuse it for /metrics}
      MCP_HTTP_RATE_LIMIT: ${MCP_HTTP_RATE_LIMIT:-100}
      MCP_HTTP_CORS_ORIGINS: ${MCP_HTTP_CORS_ORIGINS:-}
      # Skip bearer check for loopback peers (also covers Docker bridge
      # gateway 172.16-31.x, so curl from the host works without the token).
      # Listener is already on a loopback-published port; this only relaxes
      # auth for same-machine traffic.
      MCP_HTTP_TRUST_LOCALHOST: ${MCP_HTTP_TRUST_LOCALHOST:-1}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      WQM_DAEMON_ENDPOINT: memexd:50051
      WQM_LOG_LEVEL: ${WQM_LOG_LEVEL:-INFO}
      WQM_LOG_DIR: /home/node/.local/share/workspace-qdrant/logs
      # Point the MCP's read-only SQLite handle at the same memexd.db the
      # daemon writes — the memexd_db named volume mounted at /var/lib/memexd
      # above (NOT the ./state/memexd bind, which lacks memexd.db). The MCP
      # opens it with readonly:true (ADR-003: daemon owns the SQLite schema).
      WQM_DATABASE_PATH: /var/lib/memexd/memexd.db
      # Force `detectProjectForSession` to start from the bind-mounted dev
      # root instead of the container's own cwd (`/app/src/...`), which
      # otherwise gets registered as a spurious project. See spec 19 §7.4.
      WQM_PROJECT_ROOT: ${WQM_DEV_ROOT}
      # Point workspace_index actions at the bind-mounted repo so the registry
      # JSON (`.wqm-fork/indexed-projects.json`) is reached without relying on
      # the auto-detect that walks up from /app/. This is the path *inside*
      # the container — identical to the host path because of the bind mount.
      WQM_REPO_DIR: ${WQM_DEV_ROOT}/workspace-qdrant-mcp
      # Path translation pair so the TS-native workspace_index module can
      # convert host-style paths (`C:\\Users\\...`) stored in the registry
      # JSON into the bind-mount path visible inside the container. The hook
      # writer (host) and the MCP reader (container) thus stay schema-compatible.
      WQM_HOST_DEV_ROOT: ${WQM_HOST_DEV_ROOT:-}
      WQM_DEV_ROOT: ${WQM_DEV_ROOT}
      # Search-ranking tuning knobs (empty = code defaults; see search-types
      # tuningFromEnv). Re-tuned against the 44-query benchmark whenever the
      # retrieval side changes (embedding model, sparse pipeline).
      WQM_PATH_BOOST_ALPHA: ${WQM_PATH_BOOST_ALPHA:-}
      WQM_SPARSE_ONLY_WEIGHT: ${WQM_SPARSE_ONLY_WEIGHT:-}
      # "1" flips the cross-encoder rerank default ON (per-call `rerank` wins).
      WQM_SEARCH_RERANK: ${WQM_SEARCH_RERANK:-}
      # Trust the bind-mounted repo: git's "dubious ownership" check
      # otherwise rejects every command because the bind mount preserves
      # host uids that don't match the container's `node` user.
      # Inline GIT_CONFIG_* avoids needing a global gitconfig file.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "*"
      # Double opt-in for mutating workspace_index actions (start_agent_branch,
      # finish_agent_branch, register_*, cleanup_orphans). Set to "1" only in
      # trusted local/dev environments — never in shared deployments.
      WQM_INDEX_MANAGER_ALLOW_MUTATION: ${WQM_INDEX_MANAGER_ALLOW_MUTATION:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Prometheus - metrics collection
  # ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: wqm-prometheus
    <<: *restart
    logging: *default-logging
    entrypoint: ["/bin/sh", "/etc/prometheus/run-prometheus.sh"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/run-prometheus.sh:/etc/prometheus/run-prometheus.sh:ro
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    environment:
      MCP_METRICS_TOKEN: ${MCP_HTTP_TOKEN:?Set MCP_HTTP_TOKEN in .env and reuse it for /metrics}
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Grafana - dashboards and log exploration
  # ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: wqm-grafana
    <<: *restart
    logging: *default-logging
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_DISABLE_FEATURES: "autoMigrateXYChartPanel"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # OpenTelemetry Collector - OTLP -> Prometheus pipeline
  # ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:0.113.0
    container_name: wqm-otel-collector
    <<: *restart
    logging: *default-logging
    depends_on:
      - tempo
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    expose:
      - "8888"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Tempo - distributed trace backend (stores memexd daemon spans)
  # ───────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: wqm-tempo
    <<: *restart
    logging: *default-logging
    # Run as root like loki: named volumes are root-owned on creation and
    # Tempo's non-root image (uid 10001) otherwise cannot write the WAL.
    user: "0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Loki - log storage
  # ───────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: wqm-loki
    <<: *restart
    user: "0"
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Promtail - log shipper
  # ───────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: wqm-promtail
    <<: *restart
    logging: *default-logging
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      # Docker socket for container log scraping.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker JSON log files for the container_sd path relabeling.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # MCP JSONL logs shared from the mcp volume.
      - ${WQM_STATE_DIR:-./state}/mcp/logs:/var/log/mcp:ro
    depends_on:
      - loki
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ───────────────────────────────────────────────
  # Caddy - TLS reverse proxy for MCP HTTP
  # ───────────────────────────────────────────────
  caddy:
    image: caddy:2
    container_name: wqm-caddy
    <<: *restart
    depends_on:
      mcp:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ${WQM_STATE_DIR:-./state}/caddy/data:/data
      - ${WQM_STATE_DIR:-./state}/caddy/config:/config
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      MCP_PUBLIC_HOSTNAME: ${MCP_PUBLIC_HOSTNAME:-}
      MCP_TLS_EMAIL: ${MCP_TLS_EMAIL:-}
    networks:
      - workspace-network
    profiles:
      - tls
    labels:
      <<: *watchtower-off

  # ─────────────────────────────────────────────────────────────────────────
  # Embedding backends (daemon provider: openai_compatible).
  #
  # Two interchangeable servers for the SAME model (intfloat/multilingual-
  # e5-large, 1024d). The daemon PREFERS the GPU endpoint and falls back to
  # CPU automatically (embedding.base_url → wqm-embeddings-gpu:7997,
  # embedding.fallback_base_url → wqm-embeddings:80 in config.yaml), so which
  # backends run is purely a COMPOSE_PROFILES choice in docker/.env:
  #   COMPOSE_PROFILES=embeddings-cpu                  # CPU only (default)
  #   COMPOSE_PROFILES=embeddings-cpu,embeddings-gpu   # prefer GPU, CPU standby
  # The GPU service requires the NVIDIA Container Toolkit configured in the
  # Docker engine. Vectors are model-bound: switching backends needs NO
  # reembed, and the daemon re-detects a recovered primary within ~60s.
  # ─────────────────────────────────────────────────────────────────────────
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: wqm-embeddings
    <<: *restart
    logging: *default-logging
    command:
      - --model-id
      - intfloat/multilingual-e5-large
      - --auto-truncate
      - --hostname
      - 0.0.0.0
      - --port
      - "80"
    environment:
      RUST_LOG: info
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1/health || curl -fsS http://127.0.0.1/embed -H 'Content-Type: application/json' -d '{\"inputs\":\"health check\"}' >/dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      # Reuses the weights downloaded by the hand-run wqm-tei container on
      # 2026-06-10 (external volume) — no 2.2GB re-download on first up.
      - tei_data:/data
    networks:
      - workspace-network
    profiles:
      - embeddings-cpu

  embeddings-gpu:
    # Infinity (PyTorch + CUDA 12.8) instead of TEI for the GPU path: the TEI
    # CUDA images are compiled per compute capability and do not cover
    # Blackwell consumer cards (RTX 5070 Ti = sm_120), where PyTorch ≥2.7
    # works. --url-prefix /v1 exposes the OpenAI-compatible /v1/embeddings.
    image: michaelf34/infinity:latest
    container_name: wqm-embeddings-gpu
    <<: *restart
    logging: *default-logging
    command:
      - v2
      - --model-id
      - intfloat/multilingual-e5-large
      - --port
      - "7997"
      - --url-prefix
      - /v1
      # fp16 keeps the fused nested-tensor CUDA kernels in play — the auto
      # dtype picks bf16 on this card, which those kernels do not support and
      # PyTorch silently falls back to a slower generic kernel ("nested_from_
      # padded CUDA kernels only support fp32/fp16"). Same vectors for
      # retrieval purposes; ~half the VRAM.
      - --dtype
      - float16
    environment:
      # Local stack — no anonymized telemetry.
      DO_NOT_TRACK: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7997/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    volumes:
      - infinity_data:/app/.cache
    networks:
      - workspace-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - embeddings-gpu

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  workspace-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  # e5-large weights for the CPU embedding backend. Created out-of-band by the
  # hand-run TEI container on 2026-06-10 — external so `down -v` keeps it.
  tei_data:
    external: true
  # HF cache for the GPU embedding backend (Infinity downloads on first up).
  infinity_data:
  # Daemon SQLite databases. Named volume (ext4 in WSL2 VM) instead of
  # bind-mount because Docker Desktop's 9P/drvfs filesystem cannot satisfy
  # SQLite WAL's mmap/locking semantics. memexd.db, search.db, graph.db all
  # live in this volume.
  #
  # Declared `external: true` so Compose neither tries to (re)create the
  # volume on `up` nor delete it on `down -v`. Two reasons:
  #   1. Existing installs created the volume out-of-band (before this
  #      compose file declared it), so it lacks Compose's adoption labels —
  #      without `external` Compose nags "already exists but was not created
  #      by Docker Compose" on every up.
  #   2. Treating the daemon DB as external is the right contract: it
  #      outlives any single deployment and must not be accidentally wiped
  #      by `compose down -v`.
  #
  # Bootstrap on a fresh machine (idempotent — exits 0 if it already exists):
  #   docker volume create workspace-qdrant-mcp_memexd_db
  #
  # To nuke (daemon must be stopped first):
  #   docker volume rm workspace-qdrant-mcp_memexd_db
  memexd_db:
    external: true
    name: workspace-qdrant-mcp_memexd_db
