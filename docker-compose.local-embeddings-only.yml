name: workspace-qdrant-local-embeddings

services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: wqm-embeddings
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - hf_tei_data:/data
    environment:
      RUST_LOG: "info"
    command:
      - "--model-id"
      - "nomic-ai/nomic-embed-text-v1.5"
      - "--hostname"
      - "0.0.0.0"
      - "--port"
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1/health || curl -fsS http://127.0.0.1/embed -H 'Content-Type: application/json' -d '{\"inputs\":\"health check\"}' >/dev/null"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  hf_tei_data: