# docker/loki/loki-config.yml
#
# Single-binary Loki for the local observability overlay (PRD C2).
# Filesystem storage, no auth, bound inside the compose network; the only
# host-published port is 3100 (localhost-only, see observability.yml).
#
# This is a development/single-host configuration — not tuned for HA or
# multi-tenant production. Retention is short to keep disk bounded.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Bounded ingestion for a single-host dev stack.
  retention_period: 168h # 7 days
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # Reject high-cardinality label explosions defensively (promtail is already
  # configured to emit only bounded labels — see promtail-config.yml).
  max_label_names_per_series: 12

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true

analytics:
  reporting_enabled: false
