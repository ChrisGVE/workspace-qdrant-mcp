# docker/promtail/promtail-config.yml
#
# Promtail configuration for workspace-qdrant-mcp.
# Ships container logs and local file-based logs to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Job 1: Scrape all stdout/stderr logs from Docker containers running on the host
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_log_path']
        target_label: '__path__'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
    pipeline_stages:
      - docker: {}

  # Job 2: Scrape MCP server JSONL log files directly (since MCP logs to a file to avoid stdio conflicts)
  - job_name: mcp-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: mcp-logs
          container: wqm-mcp
          __path__: /var/log/mcp/*.jsonl
