# Prometheus alerting rules for workspace-qdrant-mcp v0.1.3.
#
# Six rules cover queue freshness, daemon availability, Qdrant reachability,
# and MCP session activity. Wire into Prometheus via `rule_files:` in
# prometheus.yml and mount the file read-only into the Prometheus container.
#
# Metric-name note:
#   The current daemon surface exports `wqm_queue_oldest_pending_age_seconds`
#   and `memexd_unified_queue_stale_items`. Older queue-depth and
#   queue-failure counters were retired, so the alerts below key off the
#   current freshness metrics instead.

groups:
  - name: workspace-qdrant-alerts
    interval: 30s
    rules:

      # ── Queue health ──────────────────────────────────────────

      - alert: QueueStuck
        expr: max_over_time(wqm_queue_oldest_pending_age_seconds[1h]) > 43200
        for: 5m
        labels:
          severity: warning
          component: daemon
        annotations:
          summary: "Queue has items stuck pending"
          description: "Oldest pending queue item has exceeded 12 hours. Investigate the queue processor or blocked task type."

      - alert: QueueStaleWarning
        expr: sum(memexd_unified_queue_stale_items) > 0
        for: 5m
        labels:
          severity: warning
          component: daemon
        annotations:
          summary: "Stale queue items detected"
          description: "One or more stale queue lease items have been observed for more than 5 minutes."

      - alert: QueueStaleCritical
        expr: sum(memexd_unified_queue_stale_items) > 10
        for: 5m
        labels:
          severity: critical
          component: daemon
        annotations:
          summary: "Stale queue items exceeding 10"
          description: "More than 10 stale queue lease items have been observed for more than 5 minutes. This usually means queue recovery is stuck."

      # ── Availability ─────────────────────────────────────────

      - alert: DaemonDown
        expr: up{job="memexd"} == 0
        for: 5m
        labels:
          severity: critical
          component: daemon
        annotations:
          summary: "memexd daemon unreachable"
          description: "Prometheus has been unable to scrape memexd for more than 5 minutes."

      - alert: QdrantUnreachable
        expr: up{job="qdrant"} == 0
        for: 5m
        labels:
          severity: critical
          component: qdrant
        annotations:
          summary: "Qdrant instance unreachable"
          description: "Prometheus has been unable to scrape Qdrant for more than 5 minutes."

      # ── MCP session health ───────────────────────────────────

      - alert: MCPNoInvocations
        expr: |
          sum(rate(wqm_mcp_tool_invocations_total[15m])) == 0
          and on() wqm_mcp_session_count > 0
        for: 5m
        labels:
          severity: info
          component: mcp
        annotations:
          summary: "MCP session active but idle"
          description: "An MCP session is registered but no tool invocations have been recorded in the last 15 minutes."
