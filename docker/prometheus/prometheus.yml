# Prometheus scrape configuration for workspace-qdrant-mcp v0.1.3.
#
# Used by the root compose stack and the observability overlay, and as a
# reference for users who run their own Prometheus against this project's
# services.
#
# For an external Prometheus, paste the three scrape_configs blocks below
# into the existing prometheus.yml and reload with:
#   curl -X POST http://localhost:9090/-/reload
#
# Alerting rules live in ./alerts.yml (see task 9).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# No `alerting:` block is configured — this stack does not deploy a
# notification dispatcher. Prometheus still evaluates rules from
# alerts.yml and shows firing alerts in its own UI. If a dispatcher is
# added to docker-compose.yml later, restore the `alerting:` block here.

scrape_configs:
  - job_name: memexd
    static_configs:
      - targets: [memexd:9091]
    metrics_path: /metrics

  - job_name: mcp
    static_configs:
      - targets: [mcp:9092]
    metrics_path: /metrics
    bearer_token_file: /tmp/mcp_metrics.token

  - job_name: qdrant
    static_configs:
      - targets: [qdrant:6333]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
    metrics_path: /metrics
