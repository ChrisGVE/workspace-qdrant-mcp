# Prometheus scrape configuration for workspace-qdrant-mcp v0.1.3.
#
# Used by the full-stack compose bundle and as a reference for users who
# run their own Prometheus against this project's services.
#
# For the main-docker stack (external Prometheus), paste the three
# scrape_configs blocks below into the existing prometheus.yml and
# reload with:  curl -X POST http://localhost:9090/-/reload
#
# Alerting rules live in ./alerts.yml (see task 9).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/wqm_graph_aggregates.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Alertmanager is optional. If no alertmanager runs, Prometheus
            # still evaluates rules and shows firing alerts in its UI.
            - alertmanager:9093

scrape_configs:
  - job_name: memexd
    static_configs:
      - targets: [memexd:6337]
    metrics_path: /metrics

  - job_name: mcp
    static_configs:
      - targets: [mcp:9092]
    metrics_path: /metrics
    # The mcp /metrics endpoint binds non-loopback inside the container and
    # therefore requires a bearer token (the local stack reuses
    # MCP_HTTP_TOKEN). observability.yml mounts the token file here:
    #   mkdir -p docker/secrets && printf '%s' "$MCP_HTTP_TOKEN" > docker/secrets/mcp_token
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/mcp_token

  - job_name: qdrant
    static_configs:
      - targets: [qdrant:6333]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
    metrics_path: /metrics
