# docker/compose/full-stack.yml
#
# Full-stack overlay: adds memexd + MCP server to the running main-docker stack.
# Qdrant, Prometheus, Grafana, and otel-collector are owned by main-docker —
# they are NOT redefined here.  This file attaches to main-docker's network so
# all services can reach each other by container name.
#
# Prerequisites:
#   1. main-docker stack running:
#        docker compose -f /Users/chris/dev/tools/main-docker/docker-compose.yml up -d
#   2. The external network 'main-docker_default' exists (created automatically by
#      the main-docker compose on first `up`).
#
# Usage:
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose -f docker/compose/full-stack.yml --env-file docker/.env up -d
#
# Prometheus scrape targets:
#   Reference config is in docker/prometheus/prometheus.yml (3 scrape
#   jobs + rule_files pointing at docker/prometheus/alerts.yml).
#   Prometheus in main-docker reads its config from
#   /Users/chris/dev/tools/main-docker/prometheus.yml.  Merge the
#   scrape_configs blocks from docker/prometheus/prometheus.yml into
#   that file and reload:  curl -X POST http://localhost:9090/-/reload
#
#   The mcp job target is 'workspace-qdrant-mcp:9092' on the
#   main-docker network (container name below matches).
#
#   The mcp /metrics endpoint binds non-loopback and therefore requires a
#   bearer token (the stack reuses MCP_HTTP_TOKEN). main-docker's Prometheus
#   must send it: write the token to a file readable by the prometheus
#   container and add to the mcp job:
#     authorization:
#       type: Bearer
#       credentials_file: /etc/prometheus/mcp_token
#   (docker/prometheus/prometheus.yml shows the wired-up reference job.)
#
# Ports are NOT published to the host in this mode; Prometheus reaches the
# metrics endpoints over the shared Docker network.
#
# Mount-map / path-abstraction (spec 16 §9):
#   This file defines the static service topology only. The set of host
#   directories that memexd reads (workspaces, libraries, external volumes)
#   is declared in `config.yaml` under the `mounts:` section and rendered
#   into a generated override file, NOT edited here:
#
#     wqm docker generate-compose         # write docker-compose.override.yaml
#     wqm docker generate-compose --check # detect drift before `up`
#     wqm docker generate-compose --clean # remove the override
#
#   Compose's standard merge layers the override on top of this file. The
#   override also publishes 127.0.0.1:7799:7799 (the memexd control-port
#   lock — mandatory per spec §10.1) and embeds a `# wqm-config-hash:`
#   header that the daemon entrypoint verifies on startup.

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-restart: &restart
  restart: unless-stopped

x-memexd-volumes: &memexd-volumes
  - "${HOME}/.local/share/workspace-qdrant:/home/memexd/.local/share/workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/memexd/.config/workspace-qdrant"
  - "${HOME}/dev:/home/memexd/dev:ro"

x-mcp-volumes: &mcp-volumes
  - "${HOME}/.local/share/workspace-qdrant:/home/wqm/.local/share/workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/wqm/.config/workspace-qdrant"

# ─────────────────────────────────────────────────────────────────────────────

services:
  memexd:
    image: ${MEMEXD_IMAGE:-chrisgve/memexd:v0.1.3}
    container_name: memexd
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - XDG_DATA_HOME=/home/memexd/.local/share
      - XDG_CONFIG_HOME=/home/memexd/.config
      - XDG_CACHE_HOME=/home/memexd/.cache
      - XDG_STATE_HOME=/home/memexd/.local/state
      # "qdrant" is the service name in main-docker. REST-style URL; gRPC
      # consumers translate :6333 → :6334 automatically
      # (wqm_common::qdrant_endpoint, shared by memexd and the mcp server).
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - WQM_DATABASE_PATH=/home/memexd/.local/share/workspace-qdrant/memexd.db
    volumes: *memexd-volumes
    # No host port bindings — metrics are scraped over the shared network.
    expose:
      - "50051"
      - "6337"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6337/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - main
    labels:
      <<: *watchtower-off

  mcp:
    image: ${MCP_IMAGE:-chrisgve/workspace-qdrant-mcp:v0.1.3}
    container_name: workspace-qdrant-mcp
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - WQM_DAEMON_ENDPOINT=${WQM_DAEMON_ENDPOINT:-memexd:50051}
      # Same REST-style URL as memexd; the mcp server translates :6333 → :6334
      # automatically (wqm_common::qdrant_endpoint).
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      # A containerized MCP server always runs Streamable HTTP: stdio mode
      # needs a client attached to stdin, which a detached container lacks,
      # and the /metrics endpoint only exists in http mode.
      - MCP_SERVER_MODE=http
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=6335
      - MCP_HTTP_TOKEN=${MCP_HTTP_TOKEN:?set MCP_HTTP_TOKEN in .env; generate with `openssl rand -hex 32`}
      # Metrics bind 0.0.0.0 so main-docker's Prometheus can scrape over the
      # shared network; non-loopback binds require a bearer token
      # (MCP_HTTP_TOKEN reused — hosted deployments should issue a dedicated
      # secret instead). See the header comment for the Prometheus side.
      - MCP_METRICS_HOST=0.0.0.0
      - MCP_METRICS_TOKEN=${MCP_HTTP_TOKEN}
    volumes: *mcp-volumes
    expose:
      - "6335"
      - "9092"
    depends_on:
      memexd:
        condition: service_healthy
    networks:
      - main
    labels:
      <<: *watchtower-off

# ── Networks ──────────────────────────────────────────────────────────────────
# Attach to main-docker's default network.  Docker Compose names the default
# network "<project-directory>_default"; for a project at
# /Users/chris/dev/tools/main-docker the network is "main-docker_default".
networks:
  main:
    external: true
    name: main-docker_default
