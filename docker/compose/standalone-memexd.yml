# docker/compose/standalone-memexd.yml
#
# Standalone memexd daemon only.  Qdrant must be reachable via QDRANT_URL.
#
# Usage:
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose -f docker/compose/standalone-memexd.yml --env-file docker/.env up -d
#
# One-liner equivalent:
#   docker run -d \
#     -e XDG_DATA_HOME=/home/memexd/.local/share \
#     -e XDG_CONFIG_HOME=/home/memexd/.config \
#     -e XDG_CACHE_HOME=/home/memexd/.cache \
#     -e XDG_STATE_HOME=/home/memexd/.local/state \
#     -e QDRANT_URL=http://host.docker.internal:6333 \
#     -v "${HOME}/.local/share/workspace-qdrant:/home/memexd/.local/share/workspace-qdrant" \
#     -v "${HOME}/.config/workspace-qdrant:/home/memexd/.config/workspace-qdrant" \
#     -v "${HOME}/dev:/home/memexd/dev:ro" \
#     -p 50051:50051 -p 6337:6337 \
#     chrisgve/memexd:v0.1.3

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

services:
  memexd:
    image: ${MEMEXD_IMAGE:-chrisgve/memexd:v0.1.3}
    container_name: memexd
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      - XDG_DATA_HOME=/home/memexd/.local/share
      - XDG_CONFIG_HOME=/home/memexd/.config
      - XDG_CACHE_HOME=/home/memexd/.cache
      - XDG_STATE_HOME=/home/memexd/.local/state
      # REST-style URL; memexd translates :6333 → :6334 automatically
      # (wqm_common::qdrant_endpoint).
      - QDRANT_URL=${QDRANT_URL:-http://host.docker.internal:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - WQM_DATABASE_PATH=/home/memexd/.local/share/workspace-qdrant/memexd.db
    volumes:
      - "${HOME}/.local/share/workspace-qdrant:/home/memexd/.local/share/workspace-qdrant"
      - "${HOME}/.config/workspace-qdrant:/home/memexd/.config/workspace-qdrant"
      - "${HOME}/dev:/home/memexd/dev:ro"
    ports:
      - "${MEMEXD_GRPC_PORT:-50051}:50051"
      - "${MEMEXD_METRICS_PORT:-6337}:6337"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6337/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      <<: *watchtower-off
