# docker/compose/observability.yml
#
# Self-contained observability overlay: Prometheus + Grafana + otel-collector.
# Layer this on top of minimal.yml OR reference.yml for users who do NOT
# run main-docker.
#
# Usage (reference stack — recommended for single-host deployments):
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose \
#     -f docker/compose/reference.yml \
#     -f docker/compose/observability.yml \
#     --env-file docker/.env \
#     up -d
#
# Usage (minimal stack):
#   docker compose \
#     -f docker/compose/minimal.yml \
#     -f docker/compose/observability.yml \
#     --env-file docker/.env \
#     up -d
#
# After first boot, reload Prometheus config if needed:
#   curl -X POST http://localhost:9090/-/reload
#
# Deployment choices:
#   reference.yml                        → memexd + mcp + Qdrant (no observability)
#   reference.yml + observability.yml    → same + self-hosted prometheus/grafana/otel-collector
#   minimal.yml + observability.yml      → memexd + mcp (external Qdrant) + observability
#   full-stack.yml                       → attaches to main-docker (owns observability there)
#
# All four compose files share the `workspace-network` bridge so
# Prometheus can reach `memexd:9091`, `mcp:9092`, and `qdrant:6333`.
#
# compose-spec (no Swarm, no BuildKit extensions)

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-restart: &restart
  restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: wqm-prometheus
    <<: *restart
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  grafana:
    image: grafana/grafana:11.2.0
    container_name: wqm-grafana
    <<: *restart
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  otel-collector:
    image: otel/opentelemetry-collector:0.113.0
    container_name: wqm-otel-collector
    <<: *restart
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ../otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    expose:
      - "8888"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  # ── Log aggregation (PRD C2): Loki + promtail ───────────────────────────────
  #
  # promtail tails the daemon's JSON logs (written by C1 to
  # ${WQM_STATE_DIR}/memexd/logs on the host — the same dir reference.yml/
  # minimal.yml bind-mount into the memexd container) and ships them to Loki.
  # Grafana auto-provisions a Loki datasource (see grafana/provisioning).
  # Loki is bound localhost-only (§5); promtail publishes no host port.
  loki:
    image: grafana/loki:3.2.1
    container_name: wqm-loki
    <<: *restart
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  promtail:
    image: grafana/promtail:3.2.1
    container_name: wqm-promtail
    <<: *restart
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ../promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Daemon JSON log dir (read-only). Matches the memexd state mount in
      # reference.yml/minimal.yml: <state>/memexd → .../workspace-qdrant, so
      # logs live under <state>/memexd/logs.
      - ${WQM_STATE_DIR:-./state}/memexd/logs:/var/log/memexd:ro
    depends_on:
      - loki
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

# ── Networks + Volumes ───────────────────────────────────────────────────────
#
# Network name matches reference.yml and minimal.yml so services resolve
# each other by container name when the overlay is composed in.

networks:
  workspace-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
