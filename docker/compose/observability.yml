# docker/compose/observability.yml
#
# Self-contained observability overlay: Prometheus + Grafana + otel-collector.
# Layer this on top of minimal.yml OR reference.yml for users who do NOT
# run main-docker.
#
# Usage (reference stack — recommended for single-host deployments):
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose \
#     -f docker/compose/reference.yml \
#     -f docker/compose/observability.yml \
#     --env-file docker/.env \
#     up -d
#
# Usage (minimal stack):
#   docker compose \
#     -f docker/compose/minimal.yml \
#     -f docker/compose/observability.yml \
#     --env-file docker/.env \
#     up -d
#
# After first boot, reload Prometheus config if needed:
#   curl -X POST http://localhost:9090/-/reload
#
# Deployment choices:
#   reference.yml                        → memexd + mcp + Qdrant (no observability)
#   reference.yml + observability.yml    → same + self-hosted prometheus/grafana/otel-collector
#   minimal.yml + observability.yml      → memexd + mcp (external Qdrant) + observability
#
# These compose files share the `workspace-network` bridge so
# Prometheus can reach `memexd:9091`, `mcp:9092`, and `qdrant:6333`.
#
# compose-spec (no Swarm, no BuildKit extensions)

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-restart: &restart
  restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: wqm-prometheus
    <<: *restart
    entrypoint: ["/bin/sh", "/etc/prometheus/run-prometheus.sh"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/run-prometheus.sh:/etc/prometheus/run-prometheus.sh:ro
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    environment:
      MCP_METRICS_TOKEN: ${MCP_HTTP_TOKEN:?set MCP_HTTP_TOKEN in .env; used to authenticate the MCP metrics scrape}
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  grafana:
    image: grafana/grafana:11.2.0
    container_name: wqm-grafana
    <<: *restart
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  otel-collector:
    image: otel/opentelemetry-collector:0.113.0
    container_name: wqm-otel-collector
    <<: *restart
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ../otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    expose:
      - "8888"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  loki:
    image: grafana/loki:3.0.0
    container_name: wqm-loki
    <<: *restart
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  promtail:
    image: grafana/promtail:3.0.0
    container_name: wqm-promtail
    <<: *restart
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${WQM_MCP_LOGS_DIR:-./state/mcp/logs}:/var/log/mcp:ro
    depends_on:
      - loki
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

# ── Networks + Volumes ───────────────────────────────────────────────────────
#
# Network name matches reference.yml and minimal.yml so services resolve
# each other by container name when the overlay is composed in.

networks:
  workspace-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
