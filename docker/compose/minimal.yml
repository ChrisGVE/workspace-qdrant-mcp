# docker/compose/minimal.yml
#
# Minimal deployment: memexd + MCP server, external Qdrant via QDRANT_URL.
#
# Usage:
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose -f docker/compose/minimal.yml --env-file docker/.env up -d
#
# compose-spec (no Swarm, no BuildKit extensions)

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-restart: &restart
  restart: unless-stopped

x-memexd-volumes: &memexd-volumes
  - "${HOME}/.workspace-qdrant:/home/memexd/.workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/memexd/.config/workspace-qdrant"
  - "${HOME}/dev:/home/memexd/dev:ro"

x-mcp-volumes: &mcp-volumes
  - "${HOME}/.workspace-qdrant:/home/node/.workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/node/.config/workspace-qdrant"

# ─────────────────────────────────────────────────────────────────────────────

services:
  memexd:
    image: chrisgve/memexd:v0.1.3
    container_name: memexd
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://host.docker.internal:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - WQM_DATABASE_PATH=/home/memexd/.workspace-qdrant/memexd.db
    volumes: *memexd-volumes
    ports:
      - "${MEMEXD_GRPC_PORT:-50051}:50051"
      - "${MEMEXD_METRICS_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      <<: *watchtower-off

  mcp:
    image: chrisgve/workspace-qdrant-mcp:v0.1.3
    container_name: workspace-qdrant-mcp
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - MEMEXD_GRPC_URL=${MEMEXD_GRPC_URL:-http://memexd:50051}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - MCP_SERVER_MODE=${MCP_SERVER_MODE:-stdio}
    volumes: *mcp-volumes
    ports:
      - "${MCP_METRICS_PORT:-9092}:9092"
    depends_on:
      memexd:
        condition: service_healthy
    labels:
      <<: *watchtower-off
