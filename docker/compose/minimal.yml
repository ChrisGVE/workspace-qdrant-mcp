# docker/compose/minimal.yml
#
# Minimal deployment: memexd + MCP server, external Qdrant via QDRANT_URL.
#
# Usage:
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose -f docker/compose/minimal.yml --env-file docker/.env up -d
#
# compose-spec (no Swarm, no BuildKit extensions)

# ── YAML anchors ─────────────────────────────────────────────────────────────

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

x-restart: &restart
  restart: unless-stopped

x-memexd-volumes: &memexd-volumes
  - "${HOME}/.local/share/workspace-qdrant:/home/memexd/.local/share/workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/memexd/.config/workspace-qdrant"
  - "${HOME}/dev:/home/memexd/dev:ro"

x-mcp-volumes: &mcp-volumes
  - "${HOME}/.local/share/workspace-qdrant:/home/wqm/.local/share/workspace-qdrant"
  - "${HOME}/.config/workspace-qdrant:/home/wqm/.config/workspace-qdrant"

# ─────────────────────────────────────────────────────────────────────────────

services:
  memexd:
    image: ${MEMEXD_IMAGE:-chrisgve/memexd:v0.1.3}
    container_name: memexd
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - XDG_DATA_HOME=/home/memexd/.local/share
      - XDG_CONFIG_HOME=/home/memexd/.config
      - XDG_CACHE_HOME=/home/memexd/.cache
      - XDG_STATE_HOME=/home/memexd/.local/state
      - QDRANT_URL=${QDRANT_URL:-http://host.docker.internal:6334}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - WQM_DATABASE_PATH=/home/memexd/.local/share/workspace-qdrant/memexd.db
    volumes: *memexd-volumes
    ports:
      - "${MEMEXD_GRPC_PORT:-50051}:50051"
      - "${MEMEXD_METRICS_PORT:-6337}:6337"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6337/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

  mcp:
    image: ${MCP_IMAGE:-chrisgve/workspace-qdrant-mcp:v0.1.3}
    container_name: workspace-qdrant-mcp
    <<: *restart
    env_file:
      - path: ../.env
        required: false
    environment:
      - WQM_DAEMON_ENDPOINT=${WQM_DAEMON_ENDPOINT:-memexd:50051}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - MCP_SERVER_MODE=${MCP_SERVER_MODE:-stdio}
    volumes: *mcp-volumes
    ports:
      - "${MCP_METRICS_PORT:-9092}:9092"
    depends_on:
      memexd:
        condition: service_healthy
    networks:
      - workspace-network
    labels:
      <<: *watchtower-off

# ── Networks ─────────────────────────────────────────────────────────────────
#
# Shared with docker/compose/reference.yml and observability.yml so overlay
# compositions put every service on the same bridge.

networks:
  workspace-network:
    driver: bridge
