# docker/compose/standalone-mcp.yml
#
# Standalone MCP server only.  Requires a running memexd reachable via
# WQM_DAEMON_ENDPOINT (gRPC).  Point to the standalone-memexd container, or any
# other memexd instance on the network.
#
# Usage:
#   cp docker/.env.example docker/.env   # then edit values
#   docker compose -f docker/compose/standalone-mcp.yml --env-file docker/.env up -d --build
#
# One-liner equivalent:
#   docker build -t workspace-qdrant-mcp:local .
#   docker run -d \
#     -e WQM_DAEMON_ENDPOINT=<memexd-host>:50051 \
#     -v "${HOME}/.local/share/workspace-qdrant:/home/node/.local/share/workspace-qdrant" \
#     -v "${HOME}/.config/workspace-qdrant:/home/node/.config/workspace-qdrant" \
#     -p 9092:9092 \
#     workspace-qdrant-mcp:local

x-watchtower-off: &watchtower-off
  com.centurylinklabs.watchtower.enable: "false"

services:
  mcp:
    image: ${MCP_IMAGE:-workspace-qdrant-mcp:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: workspace-qdrant-mcp
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      - WQM_DAEMON_ENDPOINT=${WQM_DAEMON_ENDPOINT:-host.docker.internal:50051}
      - WQM_LOG_LEVEL=${WQM_LOG_LEVEL:-INFO}
      - MCP_SERVER_MODE=${MCP_SERVER_MODE:-stdio}
    volumes:
      - "${HOME}/.local/share/workspace-qdrant:/home/node/.local/share/workspace-qdrant"
      - "${HOME}/.config/workspace-qdrant:/home/node/.config/workspace-qdrant"
    ports:
      - "${MCP_METRICS_PORT:-9092}:9092"
    labels:
      <<: *watchtower-off
