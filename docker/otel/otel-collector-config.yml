# docker/otel/otel-collector-config.yml
#
# OpenTelemetry Collector configuration for workspace-qdrant-mcp.
#
# Receives OTLP metrics from the MCP server (stdio mode pushes via OTLP HTTP),
# batches them, exports to Prometheus (pull) and logs for diagnostics.
#
# Used by:
#   - docker/compose/observability.yml  (self-contained stack)
#   - main-docker users may reference this file directly
#
# Mount path inside container: /etc/otel-collector-config.yml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 10
    timeout: 10s

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888

  logging:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
