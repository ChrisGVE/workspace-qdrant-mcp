# docker/otel/otel-collector-config.yml
#
# OpenTelemetry Collector configuration for workspace-qdrant-mcp.
#
# Receives OTLP metrics from the MCP server (stdio mode pushes via OTLP HTTP)
# and OTLP traces from the memexd daemon, batches them, exports metrics to
# Prometheus (pull) and forwards traces to Grafana Tempo.
#
# The traces pipeline both registers the OTLP /v1/traces route (so the daemon's
# span exporter no longer gets 404s) and ships spans to Tempo, where Grafana's
# Tempo datasource makes them queryable (Explore -> Tempo / TraceQL).
#
# Used by:
#   - docker/compose/observability.yml  (self-contained stack)
#   - main-docker users may reference this file directly
#
# Mount path inside container: /etc/otel-collector-config.yml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 10
    timeout: 10s

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888

  debug:
    verbosity: detailed

  # Forward traces to Grafana Tempo over OTLP gRPC (in-cluster, plaintext).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8889
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
