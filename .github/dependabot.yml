# GitHub Dependabot configuration for automated dependency updates
#
# Note: tree-sitter and ONNX Runtime (ort/fastembed) have dedicated custom
# workflows that push updates directly to main and tag a release:
#   - tree-sitter-version-bump.yml (daily crates.io check → direct push + tag)
#   - onnx-runtime-version-bump.yml (daily crates.io check → direct push + tag)

version: 2
updates:
  # Rust/Cargo dependencies (workspace at src/rust/)
  - package-ecosystem: "cargo"
    directory: "/src/rust"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "tree-sitter*"
          - "fastembed*"
          - "ort*"
    ignore:
      # Handled by tree-sitter-version-bump.yml (custom cross-platform workflow)
      - dependency-name: "tree-sitter"
      - dependency-name: "tree-sitter-*"
      # Handled by onnx-runtime-version-bump.yml (custom cross-platform workflow)
      - dependency-name: "fastembed"
      - dependency-name: "ort"

  # TypeScript/npm dependencies
  - package-ecosystem: "npm"
    directory: "/src/typescript/mcp-server"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "typescript"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "ci/cd"
    groups:
      github-actions:
        patterns:
          - "*"
