# Dependabot: workspace-wide dependency monitoring
#
# Covers all Rust dependencies with grouping to keep PR volume
# manageable. Specialized version bump workflows handle:
#   - tree-sitter-version-bump.yml (daily crates.io check)
#   - onnx-runtime-version-bump.yml (daily crates.io check)
#   - security.yml (cargo audit for vulnerability alerts)
#
# Pre-release policy: alpha, beta, and rc versions are ignored.

version: 2
updates:
  # Rust workspace
  - package-ecosystem: "cargo"
    directory: "/src/rust"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    groups:
      qdrant:
        patterns:
          - "qdrant-client"
      serialization:
        patterns:
          - "serde*"
          - "serde_json"
          - "serde_yaml_ng"
      async-runtime:
        patterns:
          - "tokio"
          - "tokio-*"
      database:
        patterns:
          - "sqlx"
          - "sqlx-*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        versions: ["*-alpha*", "*-beta*", "*-rc*", "*-pre*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
