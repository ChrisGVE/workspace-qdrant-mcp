# Dependabot: critical dependencies only
#
# Monitors only key integration dependencies. Other updates handled by:
#   - tree-sitter-version-bump.yml (daily crates.io check → direct push + tag)
#   - onnx-runtime-version-bump.yml (daily crates.io check → direct push + tag)
#   - security.yml (cargo audit + npm audit for vulnerability alerts)

version: 2
updates:
  # Rust: only qdrant-client
  - package-ecosystem: "cargo"
    directory: "/src/rust"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
    open-pull-requests-limit: 3
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    allow:
      - dependency-name: "qdrant-client"

  # TypeScript: only MCP SDK and Qdrant client
  - package-ecosystem: "npm"
    directory: "/src/typescript/mcp-server"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
    open-pull-requests-limit: 3
    reviewers:
      - "ChrisGVE"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "typescript"
    allow:
      - dependency-name: "@modelcontextprotocol/sdk"
      - dependency-name: "@qdrant/js-client-rest"
