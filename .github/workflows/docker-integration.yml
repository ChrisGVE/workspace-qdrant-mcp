# Docker compose end-to-end integration test
#
# Builds both images locally (no push), boots the full telemetry stack
# (minimal + observability + qdrant overlays), and runs the e2e test script.
#
# Triggers: version tags (same filter as docker-publish), manual dispatch.

name: Docker Integration Test

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to test (tag, branch, or commit SHA)'
        required: false
        default: 'dev'
        type: string

concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Full-stack e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MEMEXD_IMAGE: memexd:ci
      MCP_IMAGE: mcp:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build memexd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.memexd
          load: true
          platforms: linux/amd64
          tags: memexd:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp
          load: true
          platforms: linux/amd64
          tags: mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e integration test
        run: tests/integration/docker-compose-e2e.sh
        env:
          MEMEXD_IMAGE: memexd:ci
          MCP_IMAGE: mcp:ci
          LOG_DIR: /tmp/wqm-e2e-logs
          POLL_TIMEOUT: "120"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wqm-e2e-logs
          path: /tmp/wqm-e2e-logs/
          if-no-files-found: ignore
