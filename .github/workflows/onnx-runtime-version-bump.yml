# ONNX Runtime Version Bump Workflow
#
# Monitors ort crate (Rust ONNX Runtime bindings) for new versions and
# automatically creates PRs for updates.
#
# Key design: ort is a TRANSITIVE dependency through fastembed, not a direct
# one. Version detection reads from Cargo.lock and updates use cargo update.
#
# The ort crate version (e.g., 2.0.0-rc.11) is separate from the ONNX Runtime
# C library version (e.g., 1.23.2) used for Intel Mac static linking.
# The workflow handles both:
#   - ort crate: checked via crates.io API, updated via cargo update
#   - ORT C library: checked via supertone-inc releases for static builds

name: ONNX Runtime Version Bump

on:
  schedule:
    # Run daily at 3 AM UTC (offset from tree-sitter workflow)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force version check even if no new version'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-version:
    name: Check ort Crate Version
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.compare.outputs.needs_update }}
      current_version: ${{ steps.compare.outputs.current_version }}
      latest_version: ${{ steps.compare.outputs.latest_version }}
      ort_static_version: ${{ steps.static.outputs.version }}
      static_needs_update: ${{ steps.static.outputs.needs_update }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current ort version from Cargo.lock
        id: current
        run: |
          # ort is a transitive dependency (through fastembed), so it only
          # appears in Cargo.lock, not in any Cargo.toml as a direct dep.
          LOCK_FILE="src/rust/Cargo.lock"
          if [ ! -f "$LOCK_FILE" ]; then
            echo "ERROR: Cargo.lock not found at $LOCK_FILE"
            exit 1
          fi

          CURRENT=$(awk '/^name = "ort"$/{found=1; next} found && /^version =/{gsub(/"/, "", $3); print $3; exit}' "$LOCK_FILE")
          if [ -z "$CURRENT" ]; then
            echo "ERROR: Could not find ort package in Cargo.lock"
            exit 1
          fi

          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current ort crate version: $CURRENT"

      - name: Get latest ort version from crates.io
        id: latest
        run: |
          # Query crates.io API for latest ort version
          # Use max_version (not max_stable) because ort 2.x is still in rc
          LATEST=$(curl -sS 'https://crates.io/api/v1/crates/ort' \
            | jq -r '.crate.max_version')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest ort crate version: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"

          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT

          if [ "$CURRENT" != "$LATEST" ] || [ "${{ inputs.force_check }}" == "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Version update available: $CURRENT -> $LATEST"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already at latest version: $CURRENT"
          fi

      - name: Check supertone-inc static library version
        id: static
        run: |
          # The ONNX Runtime C library version (for Intel Mac static linking)
          # is separate from the ort crate version. Check what's available
          # from supertone-inc/onnxruntime-build.
          LATEST_STATIC=$(curl -sS 'https://api.github.com/repos/supertone-inc/onnxruntime-build/releases/latest' \
            | jq -r '.tag_name // empty' | sed 's/^v//')

          if [ -z "$LATEST_STATIC" ]; then
            echo "WARNING: Could not determine latest supertone-inc release"
            echo "version=unknown" >> $GITHUB_OUTPUT
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "version=$LATEST_STATIC" >> $GITHUB_OUTPUT
            echo "Latest supertone-inc static build: $LATEST_STATIC"

            # Check if any workflow files use a different ORT_VERSION
            CURRENT_STATIC=$(grep 'ORT_VERSION:' .github/workflows/release.yml \
              | head -1 | grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')
            if [ -n "$CURRENT_STATIC" ] && [ "$CURRENT_STATIC" != "$LATEST_STATIC" ]; then
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "Static library update available: $CURRENT_STATIC -> $LATEST_STATIC"
            else
              echo "needs_update=false" >> $GITHUB_OUTPUT
              echo "Static library already at latest: $CURRENT_STATIC"
            fi
          fi

  create-update-branch:
    name: Create Update Branch
    needs: check-version
    if: needs.check-version.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create update branch
        id: branch
        env:
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          BRANCH_NAME="deps/onnx-runtime-${LATEST_VERSION}"
          git checkout -b "$BRANCH_NAME"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Update ort crate via cargo update
        working-directory: src/rust
        env:
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          # ort is a transitive dependency through fastembed.
          # cargo update -p ort bumps it within fastembed's allowed range.
          echo "Attempting to update ort to $LATEST_VERSION..."
          cargo update -p ort 2>&1 || true

          # Verify the update took effect
          NEW_VERSION=$(awk '/^name = "ort"$/{found=1; next} found && /^version =/{gsub(/"/, "", $3); print $3; exit}' Cargo.lock)
          echo "ort version after update: $NEW_VERSION"

          if [ "$NEW_VERSION" != "$LATEST_VERSION" ]; then
            echo "WARNING: cargo update resolved ort to $NEW_VERSION instead of $LATEST_VERSION"
            echo "This is likely because fastembed constrains the ort version range."
            echo "The update will proceed with $NEW_VERSION if it differs from the current version."
          fi

      - name: Update ORT_VERSION in workflow files
        if: needs.check-version.outputs.static_needs_update == 'true'
        env:
          LATEST_STATIC: ${{ needs.check-version.outputs.ort_static_version }}
        run: |
          echo "Updating ORT_VERSION to $LATEST_STATIC in workflow files..."

          # Find all workflow files with ORT_VERSION and update them
          for file in .github/workflows/*.yml; do
            if grep -q 'ORT_VERSION:' "$file"; then
              # Replace the version string after ORT_VERSION:
              sed -i "s/ORT_VERSION: \"[0-9.]*\"/ORT_VERSION: \"$LATEST_STATIC\"/" "$file"
              echo "Updated $file"
            fi
          done

      - name: Commit and push
        id: commit
        env:
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit — ort is already at the latest version fastembed allows"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git commit -m "deps: bump ort (ONNX Runtime) to $LATEST_VERSION"
            git push origin "$BRANCH_NAME"
          fi

  # Cross-platform build matrix - critical for ONNX Runtime
  cross-platform-build:
    name: Build (${{ matrix.name }})
    needs: [check-version, create-update-branch]
    if: needs.create-update-branch.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: Linux x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: Linux ARM64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13  # Intel Mac runner
            name: macOS Intel
            needs_ort_download: true
          - target: aarch64-apple-darwin
            os: macos-14  # Apple Silicon runner
            name: macOS ARM64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: Windows x86_64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: Windows ARM64
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-update-branch.outputs.branch_name }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # ONNX Runtime static library for Intel Mac
      # Read ORT_VERSION from the workflow file on the update branch (may have been bumped)
      - name: Determine ORT static version
        if: matrix.needs_ort_download
        id: ort-version
        shell: bash
        run: |
          # Read ORT_VERSION from release.yml on this branch
          ORT_VER=$(grep 'ORT_VERSION:' .github/workflows/release.yml \
            | head -1 | grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')
          echo "version=$ORT_VER" >> $GITHUB_OUTPUT
          echo "Using ORT static library version: $ORT_VER"

      - name: Cache ONNX Runtime (Intel Mac)
        if: matrix.needs_ort_download
        uses: actions/cache@v4
        id: onnx-cache
        with:
          path: ~/.onnxruntime-static
          key: onnxruntime-static-${{ steps.ort-version.outputs.version }}-${{ matrix.target }}

      - name: Download ONNX Runtime static library (Intel Mac)
        if: matrix.needs_ort_download && steps.onnx-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          ORT_VER: ${{ steps.ort-version.outputs.version }}
        run: |
          mkdir -p ~/.onnxruntime-static
          curl -fL "https://github.com/supertone-inc/onnxruntime-build/releases/download/v${ORT_VER}/onnxruntime-osx-universal2-static_lib-${ORT_VER}.tgz" -o ~/.onnxruntime-static/ort.tgz
          tar xzf ~/.onnxruntime-static/ort.tgz -C ~/.onnxruntime-static
          rm ~/.onnxruntime-static/ort.tgz

      - name: Set ORT environment (Intel Mac)
        if: matrix.needs_ort_download
        shell: bash
        run: echo "ORT_LIB_LOCATION=$HOME/.onnxruntime-static/lib" >> $GITHUB_ENV

      # Cache cargo dependencies
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        id: build
        working-directory: src/rust
        continue-on-error: true
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} 2>&1 | tee build.log

      - name: Run tests (native platforms only)
        id: test
        if: matrix.cross != true && steps.build.outcome == 'success'
        working-directory: src/rust
        continue-on-error: true
        shell: bash
        run: |
          cargo test --target ${{ matrix.target }} 2>&1 | tee test.log

      - name: Upload build log on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.target }}
          path: src/rust/build.log

  create-pr-or-issue:
    name: Create PR or Issue
    needs: [check-version, create-update-branch, cross-platform-build]
    if: always() && needs.create-update-branch.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.cross-platform-build.result }}" == "success" ]; then
            echo "all_success=true" >> $GITHUB_OUTPUT
          else
            echo "all_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.status.outputs.all_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
          BRANCH_NAME: ${{ needs.create-update-branch.outputs.branch_name }}
          ORT_STATIC: ${{ needs.check-version.outputs.ort_static_version }}
          STATIC_UPDATED: ${{ needs.check-version.outputs.static_needs_update }}
        run: |
          STATIC_NOTE=""
          if [ "$STATIC_UPDATED" == "true" ]; then
            STATIC_NOTE="- Updated Intel Mac static library (ORT_VERSION) to \`$ORT_STATIC\`"
          fi

          gh pr create \
            --title "deps: bump ort (ONNX Runtime) from $CURRENT_VERSION to $LATEST_VERSION" \
            --body "## ONNX Runtime Version Update

          Automated PR to update ONNX Runtime (ort crate) dependency.

          ### Changes
          - Updated \`ort\` from \`$CURRENT_VERSION\` to \`$LATEST_VERSION\` via \`cargo update -p ort\`
          $STATIC_NOTE

          ### Cross-Platform Build Status
          All target platforms built and tested successfully:
          - :white_check_mark: Linux x86_64
          - :white_check_mark: Linux ARM64
          - :white_check_mark: macOS Intel (x86_64)
          - :white_check_mark: macOS Apple Silicon (ARM64)
          - :white_check_mark: Windows x86_64
          - :white_check_mark: Windows ARM64

          ### Notes
          - \`ort\` is a transitive dependency through \`fastembed\`
          - Version is constrained by fastembed's dependency specification
          - See [ort releases](https://github.com/pykeio/ort/releases) for changelog

          ---
          *This PR was automatically created by the ONNX Runtime version bump workflow.*" \
            --label "dependencies,automated" \
            --base main \
            --head "$BRANCH_NAME"

      - name: Enable auto-merge
        if: steps.status.outputs.all_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr view --json number -q '.number')
          gh pr merge "$PR_NUMBER" --auto --squash || true

      - name: Create issue on build failure
        if: steps.status.outputs.all_success == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          gh issue create \
            --title "ONNX Runtime update to $LATEST_VERSION failed to build" \
            --body "## ONNX Runtime Update Build Failure

          The automated version bump workflow detected a new ort crate version but cross-platform builds failed.

          ### Version Details
          - Current: \`$CURRENT_VERSION\`
          - Target: \`$LATEST_VERSION\`
          - Note: \`ort\` is a transitive dependency through \`fastembed\`

          ### Build Result
          Cross-platform build job result: ${{ needs.cross-platform-build.result }}

          ### Known Issues
          - **Apple Intel (x86_64-apple-darwin)**: Requires static ONNX Runtime library from supertone-inc. Check if a compatible static build is available.
          - **Cross-compilation**: ARM64 targets may require updated system libraries.

          ### Next Steps
          1. Download build logs from the workflow artifacts
          2. Check if the ort update requires a fastembed update
          3. Check if supertone-inc has a compatible static library release
          4. Manually create a PR with the necessary fixes

          ### Branch
          The update branch \`deps/onnx-runtime-$LATEST_VERSION\` contains the version bump.

          ---
          *This issue was automatically created by the ONNX Runtime version bump workflow.*" \
            --label "bug,dependencies,automated,platform-specific"
  # Post-merge patch release is handled by deps-post-merge-release.yml
  # which triggers on push to main from dependency update branches.
