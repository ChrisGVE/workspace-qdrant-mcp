# Version Consistency Validation
# Ensures dependency versions are consistent across config files, YAML defaults,
# and CI workflow files. Catches drift when dependencies are updated.

name: Version Consistency

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/rust/**/Cargo.toml'
      - 'src/rust/Cargo.lock'
      - 'assets/default_configuration.yaml'
      - '.github/workflows/*.yml'
      - 'scripts/check-version-consistency.sh'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/rust/**/Cargo.toml'
      - 'src/rust/Cargo.lock'
      - 'assets/default_configuration.yaml'
      - '.github/workflows/*.yml'
      - 'scripts/check-version-consistency.sh'

env:
  CARGO_TERM_COLOR: always

jobs:
  config-validation:
    name: Config File Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run version consistency checks
        run: scripts/check-version-consistency.sh

  rust-version-tests:
    name: Rust Version Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-version-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-version-check-

      - name: Run version consistency tests
        working-directory: src/rust
        run: cargo test --package workspace-qdrant-core --test version_consistency_tests
