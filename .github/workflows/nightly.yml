# Nightly build workflow for workspace-qdrant-mcp
# Builds binaries from HEAD daily and publishes a rolling "nightly" pre-release.
#
# The nightly release is updated in-place each run (tag moves to latest HEAD).
# This provides a way to test current builds before a stable release.
#
# Platforms:
# - macOS ARM (Apple Silicon) — native build on macos-latest
# - macOS Intel (x86_64) — cross-compiled on macos-latest with ORT universal2 static lib
# - Linux x64 — native build on ubuntu-latest
# - Linux ARM64 — native build on ubuntu-24.04-arm

name: Nightly Build

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ORT_VERSION: "1.23.2"

jobs:
  # Check if there are new commits since last nightly to avoid unnecessary builds
  check:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — building"
            exit 0
          fi

          # Check if nightly tag exists
          if git rev-parse nightly >/dev/null 2>&1; then
            NIGHTLY_SHA=$(git rev-parse nightly)
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$NIGHTLY_SHA" = "$HEAD_SHA" ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "No new commits since last nightly — skipping"
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "New commits found — building"
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "No previous nightly — building"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon) — native on ARM runner
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: darwin-arm64
            needs_ort_download: false

          # macOS Intel — cross-compile on ARM runner (ORT universal2 covers both arches)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: darwin-x64
            needs_ort_download: true

          # Linux x64 — native build
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: linux-x64
            needs_ort_download: false

          # Linux ARM64 — native build on ARM runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            needs_ort_download: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake protobuf

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev cmake liblzma-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-nightly-
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache ONNX Runtime (Intel Mac cross-compile)
        if: matrix.needs_ort_download
        uses: actions/cache@v4
        id: onnx-cache
        with:
          path: ~/.onnxruntime-static
          key: onnxruntime-static-${{ env.ORT_VERSION }}-${{ matrix.target }}

      - name: Download ONNX Runtime static library (Intel Mac cross-compile)
        if: matrix.needs_ort_download && steps.onnx-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.onnxruntime-static
          curl -L "https://github.com/supertone-inc/onnxruntime-build/releases/download/v${{ env.ORT_VERSION }}/onnxruntime-osx-universal2-static_lib-${{ env.ORT_VERSION }}.tgz" -o ~/.onnxruntime-static/ort.tgz
          tar xzf ~/.onnxruntime-static/ort.tgz -C ~/.onnxruntime-static
          rm ~/.onnxruntime-static/ort.tgz

      - name: Set ORT environment (Intel Mac cross-compile)
        if: matrix.needs_ort_download
        run: echo "ORT_LIB_LOCATION=$HOME/.onnxruntime-static/lib" >> $GITHUB_ENV

      # Install x86_64 OpenSSL for Intel Mac cross-compilation via Rosetta
      # GitHub ARM runners have Rosetta available. Install x86_64 Homebrew + OpenSSL.
      - name: Install x86_64 OpenSSL (Intel Mac cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Install x86_64 Homebrew under Rosetta if not present
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "NONINTERACTIVE=1 $(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          arch -x86_64 /usr/local/bin/brew install openssl@3
          OPENSSL_PREFIX=$(arch -x86_64 /usr/local/bin/brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> $GITHUB_ENV
          echo "Installed x86_64 OpenSSL at $OPENSSL_PREFIX"

      - name: Build
        working-directory: src/rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        run: |
          src/rust/target/${{ matrix.target }}/release/memexd --version
          src/rust/target/${{ matrix.target }}/release/wqm --version

      - name: Prepare archive
        run: |
          mkdir -p artifacts
          cp src/rust/target/${{ matrix.target }}/release/memexd artifacts/
          cp src/rust/target/${{ matrix.target }}/release/wqm artifacts/
          cp LICENSE artifacts/
          cd artifacts && tar -czvf ../workspace-qdrant-mcp-${{ matrix.artifact_name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.artifact_name }}
          path: workspace-qdrant-mcp-${{ matrix.artifact_name }}.tar.gz

  release:
    name: Publish Nightly
    needs: build
    # Publish even if some builds failed (partial nightly is better than none)
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: artifacts

      - name: Check for artifacts
        id: check_artifacts
        run: |
          count=$(find artifacts -name '*.tar.gz' 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          if [ "$count" -eq 0 ]; then
            echo "No artifacts found — skipping release"
          else
            echo "Found $count artifact(s)"
          fi

      - name: Generate checksums
        if: steps.check_artifacts.outputs.count != '0'
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > checksums.txt
          cat checksums.txt

      - name: Delete existing nightly release
        if: steps.check_artifacts.outputs.count != '0'
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        if: steps.check_artifacts.outputs.count != '0'
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: List available platforms
        if: steps.check_artifacts.outputs.count != '0'
        id: platforms
        run: |
          PLATFORMS=""
          for f in artifacts/nightly-*/workspace-qdrant-mcp-*.tar.gz; do
            name=$(basename "$f" .tar.gz | sed 's/workspace-qdrant-mcp-//')
            case "$name" in
              darwin-arm64) PLATFORMS="${PLATFORMS}- \`darwin-arm64\` — macOS Apple Silicon (M1/M2/M3/M4)\n" ;;
              darwin-x64)   PLATFORMS="${PLATFORMS}- \`darwin-x64\` — macOS Intel\n" ;;
              linux-x64)    PLATFORMS="${PLATFORMS}- \`linux-x64\` — Linux x86_64\n" ;;
              linux-arm64)  PLATFORMS="${PLATFORMS}- \`linux-arm64\` — Linux ARM64\n" ;;
            esac
          done
          # Escape for GITHUB_OUTPUT
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$PLATFORMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create nightly release
        if: steps.check_artifacts.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ steps.date.outputs.date }})"
          prerelease: true
          make_latest: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/checksums.txt
          body: |
            ## Nightly Build

            **Built from:** `${{ github.sha }}`
            **Date:** ${{ steps.date.outputs.date }}

            These are automated nightly builds from the `main` branch.
            They may be unstable — use at your own risk.

            ### Available platforms
            ${{ steps.platforms.outputs.list }}
            ### Install
            ```bash
            # Download and extract (example for macOS ARM)
            curl -fsSL https://github.com/ChrisGVE/workspace-qdrant-mcp/releases/download/nightly/workspace-qdrant-mcp-darwin-arm64.tar.gz | tar xz
            cp memexd wqm ~/.local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
