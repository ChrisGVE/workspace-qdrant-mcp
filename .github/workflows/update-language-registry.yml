name: Update Language Registry

on:
  schedule:
    # Monthly on the 1st at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only print summary, no PR)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  ORT_LIB_LOCATION: ${{ github.workspace }}/.onnxruntime-static/lib

jobs:
  update-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: registry-updater-${{ runner.os }}-${{ hashFiles('src/rust/Cargo.lock') }}

      - name: Download ONNX Runtime static library
        run: |
          mkdir -p .onnxruntime-static
          curl -sL "https://github.com/supertone-inc/onnxruntime-build/releases/download/v1.23.2/onnxruntime-linux-x64-static_lib-1.23.2.tgz" \
            -o .onnxruntime-static/ort.tgz
          tar xzf .onnxruntime-static/ort.tgz -C .onnxruntime-static
          rm .onnxruntime-static/ort.tgz

      - name: Build registry-updater
        working-directory: src/rust
        run: cargo build --release --package registry-updater

      - name: Run registry-updater
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            src/rust/target/release/registry-updater \
              --dry-run \
              --current src/rust/daemon/core/src/language_registry/language_registry.yaml
          else
            src/rust/target/release/registry-updater \
              --output src/rust/daemon/core/src/language_registry/language_registry.yaml \
              --current src/rust/daemon/core/src/language_registry/language_registry.yaml
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        if: inputs.dry_run != 'true'
        id: diff
        run: |
          git diff --exit-code src/rust/daemon/core/src/language_registry/language_registry.yaml || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(languages): automated language registry update'
          body: |
            ## Summary

            Monthly automated sync from upstream language data sources:
            - GitHub Linguist (language identity)
            - tree-sitter-grammars org (curated grammars)
            - tree-sitter wiki (community grammars)
            - nvim-treesitter lockfile (grammar repos)
            - mason-registry (LSP servers)

            Review the diff carefully before merging. Pay attention to:
            - New languages added
            - Grammar source changes
            - LSP server additions

            ---
            *Generated by registry-updater GitHub Action*
          branch: automated-language-registry-update
          commit-message: 'chore(languages): automated language registry update'
          labels: |
            dependencies
            automated
          delete-branch: true
