# Tree-sitter Version Bump Workflow
# Monitors tree-sitter releases and pushes updates directly to main with a version tag.
# The tag push triggers release.yml which builds all 6 targets.
#
# GRACE PERIOD: When a new tree-sitter version is detected, the workflow waits
# 14 days before applying the update. This gives grammar maintainers time to
# regenerate parser.c for the new ABI, so users' cached grammars remain compatible.
name: Tree-sitter Version Bump

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force version check even if no new version'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check Tree-sitter Version
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.compare.outputs.needs_update }}
      current_version: ${{ steps.compare.outputs.current_version }}
      latest_version: ${{ steps.compare.outputs.latest_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current tree-sitter version from Cargo.toml
        id: current
        run: |
          # Extract tree-sitter version from daemon Cargo.toml
          CURRENT=$(grep 'tree-sitter = ' src/rust/daemon/core/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current tree-sitter version: $CURRENT"

      - name: Get latest tree-sitter version from crates.io
        id: latest
        run: |
          # Query crates.io API for latest tree-sitter version
          # Retry up to 3 times with backoff (crates.io can be flaky)
          for attempt in 1 2 3; do
            LATEST=$(curl -sSf -H "User-Agent: workspace-qdrant-mcp CI (github.com/ChrisGVE/workspace-qdrant-mcp)" \
              'https://crates.io/api/v1/crates/tree-sitter' \
              | jq -r '.crate.max_stable_version // .crate.max_version') && break
            echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done

          # Validate: must look like a semver (digits.digits or digits.digits.digits)
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ] || ! echo "$LATEST" | grep -qE '^[0-9]+\.[0-9]+'; then
            echo "ERROR: crates.io returned invalid version: '$LATEST'"
            exit 1
          fi

          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tree-sitter version: $LATEST"

      - name: Compare versions and enforce grace period
        id: compare
        env:
          GRACE_PERIOD_DAYS: 14
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          TRACKING_FILE=".github/.ts-version-detected"

          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT

          if [ "${{ inputs.force_check }}" == "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Force check enabled, bypassing grace period"
          elif [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already at latest version: $CURRENT"
            # Clean up tracking file if version caught up externally
            if [ -f "$TRACKING_FILE" ]; then
              rm "$TRACKING_FILE"
              echo "Removed stale tracking file"
            fi
          else
            # New version detected — check grace period
            NOW=$(date +%s)

            if [ -f "$TRACKING_FILE" ]; then
              TRACKED_VERSION=$(head -1 "$TRACKING_FILE")
              DETECTED_TS=$(tail -1 "$TRACKING_FILE")

              if [ "$TRACKED_VERSION" != "$LATEST" ]; then
                # Different new version — reset tracking
                echo "$LATEST" > "$TRACKING_FILE"
                echo "$NOW" >> "$TRACKING_FILE"
                echo "needs_update=false" >> $GITHUB_OUTPUT
                echo "New version $LATEST detected (was tracking $TRACKED_VERSION). Grace period reset (${GRACE_PERIOD_DAYS} days)."
              else
                ELAPSED=$(( (NOW - DETECTED_TS) / 86400 ))
                if [ "$ELAPSED" -ge "$GRACE_PERIOD_DAYS" ]; then
                  echo "needs_update=true" >> $GITHUB_OUTPUT
                  echo "Grace period elapsed (${ELAPSED}d >= ${GRACE_PERIOD_DAYS}d). Proceeding with update: $CURRENT -> $LATEST"
                else
                  echo "needs_update=false" >> $GITHUB_OUTPUT
                  REMAINING=$((GRACE_PERIOD_DAYS - ELAPSED))
                  echo "Version $LATEST detected ${ELAPSED}d ago. Waiting ${REMAINING}d more (grace period: ${GRACE_PERIOD_DAYS}d)."
                fi
              fi
            else
              # First detection — start tracking
              echo "$LATEST" > "$TRACKING_FILE"
              echo "$NOW" >> "$TRACKING_FILE"
              echo "needs_update=false" >> $GITHUB_OUTPUT
              echo "New version $LATEST detected. Starting ${GRACE_PERIOD_DAYS}-day grace period for grammar ecosystem to update."
            fi
          fi

      - name: Persist tracking file
        if: always()
        run: |
          TRACKING_FILE=".github/.ts-version-detected"
          if [ -f "$TRACKING_FILE" ] && ! git diff --quiet -- "$TRACKING_FILE" 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$TRACKING_FILE"
            git commit -m "chore: track tree-sitter version detection timestamp" || true
            git pull --rebase origin main
            git push origin main
          elif [ ! -f "$TRACKING_FILE" ] && git ls-files --error-unmatch "$TRACKING_FILE" >/dev/null 2>&1; then
            # Tracking file was removed (version caught up) — commit removal
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm "$TRACKING_FILE"
            git commit -m "chore: remove tree-sitter version tracking (up to date)" || true
            git pull --rebase origin main
            git push origin main
          fi

  update-and-release:
    name: Update and Release
    needs: check-version
    if: needs.check-version.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update tree-sitter version in Cargo.toml files
        env:
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          # Update all Cargo.toml files that reference tree-sitter
          find . -name 'Cargo.toml' -not -path '*/target/*' -not -path '*/patches/*' -type f | while read file; do
            if grep -q 'tree-sitter' "$file"; then
              echo "Updating $file"
              sed -i "s/tree-sitter = \"$CURRENT_VERSION\"/tree-sitter = \"$LATEST_VERSION\"/g" "$file"
              sed -i "s/tree-sitter = { version = \"$CURRENT_VERSION\"/tree-sitter = { version = \"$LATEST_VERSION\"/g" "$file"
            fi
          done

          # Update transitive tree-sitter dependencies in lock file
          cd src/rust
          cargo update -p tree-sitter || true

      - name: Update default_configuration.yaml if major.minor changed
        env:
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          CURRENT_MM=$(echo "$CURRENT_VERSION" | cut -d. -f1,2)
          LATEST_MM=$(echo "$LATEST_VERSION" | cut -d. -f1,2)
          if [ "$CURRENT_MM" != "$LATEST_MM" ]; then
            CONFIG="assets/default_configuration.yaml"
            if [ -f "$CONFIG" ] && grep -q 'tree_sitter_version' "$CONFIG"; then
              sed -i "s/tree_sitter_version:.*/tree_sitter_version: \"$LATEST_MM\"/" "$CONFIG"
              echo "Updated tree_sitter_version in $CONFIG"
            fi
          fi

      - name: Check for actual changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected — tree-sitter may already be at latest"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest_version }}
        run: |
          # Remove grace period tracking file (update is being applied)
          TRACKING_FILE=".github/.ts-version-detected"
          if [ -f "$TRACKING_FILE" ]; then
            git rm "$TRACKING_FILE" || rm -f "$TRACKING_FILE"
          fi

          git add src/rust/Cargo.lock
          git add assets/default_configuration.yaml
          git commit -m "deps: bump tree-sitter from $CURRENT_VERSION to $LATEST_VERSION"
          git pull --rebase origin main
          git push origin main
