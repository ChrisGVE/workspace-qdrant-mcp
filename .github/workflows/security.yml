# Security scanning for workspace-qdrant-mcp
# Rust dependency audit + secrets scanning
#
# ┌────────────────────────────────┬───────────────────────────────────────────────────────┬────────────┐
# │ Advisory                       │ Rationale                                             │ Review by  │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2024-0437 (proc-macro2)│ Upstream fix in syn/proc-macro2; no user-facing       │ 2025-09-01 │
# │                                │ impact, transitive dep via fastembed/ort toolchain.    │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2023-0071 (rsa crate)  │ Marvin attack on PKCS#1 v1.5 decryption; we do not   │ 2025-09-01 │
# │                                │ use RSA decryption. Transitive dep via reqwest/       │            │
# │                                │ rustls. Cannot upgrade without fastembed update.      │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2021-0145 (atty)       │ Potential unaligned read. Transitive dep via          │ 2026-09-01 │
# │                                │ clap v3 (used by ort). No direct usage. Unmaintained  │            │
# │                                │ crate; successor is std::io::IsTerminal.              │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2026-0002 (lru)        │ IterMut Stacked Borrows violation. Transitive dep     │ 2026-09-01 │
# │                                │ via ratatui (CLI TUI). We don't use LRU IterMut.      │            │
# │                                │ Awaiting ratatui update to lru >=0.13.                │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2026-{0066,0112,0113,  │ astral-tokio-tar PAX header / symlink / extraction    │ 2026-09-01 │
# │   0145} (astral-tokio-tar)     │ issues. Transitive dep via testcontainers (test only).│            │
# │                                │ We don't extract untrusted archives. Awaiting          │            │
# │                                │ testcontainers update.                                │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2026-{0098,0099,0104}  │ rustls-webpki name constraint / CRL parsing issues.   │ 2026-09-01 │
# │ (rustls-webpki)                │ Transitive dep via reqwest/rustls and ort. We don't   │            │
# │                                │ validate name constraints or parse CRLs directly.     │            │
# │                                │ Awaiting upstream rustls/reqwest/ort updates.          │            │
# └────────────────────────────────┴───────────────────────────────────────────────────────┴────────────┘

name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM UTC
  workflow_dispatch:

jobs:
  cargo-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: src/rust
        run: |
          cargo audit --ignore yanked \
            --ignore RUSTSEC-2024-0437 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2021-0145 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2026-0112 \
            --ignore RUSTSEC-2026-0113 \
            --ignore RUSTSEC-2026-0145 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          # PRs: full history for diff; schedule: last 50 commits only
          fetch-depth: ${{ github.event_name == 'schedule' && 50 || 0 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
