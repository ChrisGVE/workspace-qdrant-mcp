# Security scanning for workspace-qdrant-mcp
# Rust dependency audit + secrets scanning
#
# ┌────────────────────────────────┬───────────────────────────────────────────────────────┬────────────┐
# │ Advisory                       │ Rationale                                             │ Review by  │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2024-0437 (proc-macro2)│ Upstream fix in syn/proc-macro2; no user-facing       │ 2025-09-01 │
# │                                │ impact, transitive dep via fastembed/ort toolchain.    │            │
# ├────────────────────────────────┼───────────────────────────────────────────────────────┼────────────┤
# │ RUSTSEC-2023-0071 (rsa crate)  │ Marvin attack on PKCS#1 v1.5 decryption; we do not   │ 2025-09-01 │
# │                                │ use RSA decryption. Transitive dep via reqwest/       │            │
# │                                │ rustls. Cannot upgrade without fastembed update.      │            │
# └────────────────────────────────┴───────────────────────────────────────────────────────┴────────────┘

name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM UTC
  workflow_dispatch:

jobs:
  cargo-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: src/rust
        run: |
          cargo audit --ignore yanked \
            --ignore RUSTSEC-2024-0437 \
            --ignore RUSTSEC-2023-0071

  npm-audit:
    name: npm dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/typescript/mcp-server
        run: npm ci

      - name: Run npm audit
        working-directory: src/typescript/mcp-server
        run: npm audit --omit=dev

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          # PRs: full history for diff; schedule: last 50 commits only
          fetch-depth: ${{ github.event_name == 'schedule' && 50 || 0 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
