# Continuous Integration workflow for workspace-qdrant-mcp
# Runs on push to main/dev and all pull requests

name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/rust/**'
      - 'src/typescript/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/rust/**'
      - 'src/typescript/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust formatting check (fast, runs once)
  fmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: src/rust
        run: cargo fmt --all -- --check

  # Rust build, lint, and test
  rust:
    name: Rust (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev cmake tesseract-ocr libtesseract-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake protobuf tesseract

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ort crate auto-downloads static ONNX Runtime for ARM Mac and Linux x64
      # No manual ORT_LIB_LOCATION needed for these platforms

      - name: Clippy
        working-directory: src/rust
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Build
        working-directory: src/rust
        run: cargo build --release

      - name: Test
        working-directory: src/rust
        run: cargo test --release

  # TypeScript MCP server (build only)
  # Full test suite requires wqm-common-node native addon (Rust napi build)
  # which needs the Rust toolchain. Tests run in the release workflow instead.
  typescript:
    name: TypeScript MCP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/typescript/mcp-server
        run: npm ci

      - name: Type-check and build
        working-directory: src/typescript/mcp-server
        run: npm run build
