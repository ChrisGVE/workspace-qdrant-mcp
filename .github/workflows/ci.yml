# Continuous Integration for workspace-qdrant-mcp
# Runs on push to main/dev, pull requests, and manual dispatch

name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/rust/**'
      - 'src/typescript/**'
      - 'tests/**'
      - 'assets/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/rust/**'
      - 'src/typescript/**'
      - 'tests/**'
      - 'assets/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep in sync with RUST_VERSION in docker/Dockerfile.memexd. rustfmt and
  # clippy output drift across releases, so CI must run the same toolchain as
  # the container builder / `--target validate` gate or the two checks disagree.
  RUST_TOOLCHAIN: "1.90"

jobs:
  # Rust formatting check (fast, runs once)
  fmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Check formatting
        working-directory: src/rust
        run: cargo fmt --all -- --check

  # Guard against new hardcoded ~/.claude paths creeping back into the hooks
  # module. All path resolution must go through settings::get_claude_config_dir
  # so CLAUDE_CONFIG_DIR (Claude Code Enterprise / custom installs) is honored.
  hooks-claude-path-audit:
    name: Hooks — no hardcoded .claude paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan hooks module
        run: |
          set -euo pipefail
          hits=$(grep -rn '\.claude' src/rust/cli/src/commands/hooks/ --include='*.rs' \
            | grep -v 'CLAUDE_CONFIG_DIR' \
            | grep -Ev "^[^:]+:[0-9]+:\s*(//|///|\*)" \
            | grep -v 'settings.rs' \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Found hardcoded .claude paths outside settings.rs (use get_claude_config_dir):"
            echo "$hits"
            exit 1
          fi

  # Path abstraction discipline guards (spec 16 §4.3).
  # Enforce that canonical paths are properly typed and canonicalize() calls
  # are either removed (T6) or explicitly marked as Category B (process-local).
  path-discipline:
    name: Path discipline (struct fields)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check path-named struct fields
        run: bash scripts/ci/path-discipline.sh

  forbid-canonicalize:
    name: Path discipline (canonicalize markers)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for unmarked canonicalize() calls
        run: bash scripts/ci/forbid_canonicalize.sh

  # Guard against version drift: ORT_VERSION must match across workflow files,
  # and the tree-sitter version in assets/default_configuration.yaml must match
  # src/rust/Cargo.lock (build.rs reads it). See scripts/check-version-consistency.sh.
  version-consistency:
    name: Version consistency (ORT + tree-sitter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: bash scripts/check-version-consistency.sh

  # Guard against gRPC proto drift. The TypeScript MCP daemon-client does NOT
  # codegen from the canonical Rust proto — it calls RPCs via hardcoded
  # camelCase method-name strings. If a daemon RPC is renamed/removed, the TS
  # side still compiles and only fails at runtime with "Unknown method".
  proto-consistency:
    name: Proto consistency (TS calls vs Rust proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check proto consistency
        run: bash scripts/check-proto-consistency.sh


  # Rust build, lint, and test
  rust:
    name: Rust (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev cmake liblzma-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ort crate auto-downloads static ONNX Runtime for ARM Mac and Linux x64
      # No manual ORT_LIB_LOCATION needed for these platforms

      - name: Clippy
        working-directory: src/rust
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Build
        working-directory: src/rust
        run: cargo build --release

      - name: Test
        working-directory: src/rust
        # Exclude workspace-qdrant-grpc integration tests (require running Qdrant)
        run: cargo test --release --workspace --exclude workspace-qdrant-grpc

  # TypeScript MCP server — build, unit tests, and integration tests
  # Full test suite requires wqm-common-node native addon (Rust napi build)
  # which needs the Rust toolchain. Tests run in the release workflow instead.
  typescript:
    name: TypeScript MCP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/typescript/mcp-server
        run: npm ci

      - name: Rebuild native addons
        working-directory: src/typescript/mcp-server
        run: npm rebuild better-sqlite3

      - name: Type-check and build
        working-directory: src/typescript/mcp-server
        run: npm run build

      - name: Lint — path-discipline rule (src/common/paths.ts)
        working-directory: src/typescript/mcp-server
        # Enforce the no-restricted-syntax ESLint rule that bans
        # `as CanonicalPath` / `as LocalPath` casts outside paths.ts.
        # Only src/common/paths.ts is linted here; the broader src/ lint
        # has pre-existing issues tracked separately.
        # See docs/specs/16-path-abstraction.md §4.2.
        run: node_modules/.bin/eslint src/common/paths.ts src/common/index.ts

      - name: Unit tests
        working-directory: src/typescript/mcp-server
        # Run tests that don't require the wqm-common-node native addon.
        # Tests needing SQLite (better-sqlite3) work after native addon rebuild.
        # Tests requiring live services (Qdrant, daemon) are in tests/integration/
        # and excluded here — they run in the integration-tests job below.
        run: npm test -- --exclude 'tests/integration/**'

  # TypeScript integration tests — require live daemon or Qdrant
  # These are allowed to skip in CI (no live services available).
  typescript-integration:
    name: TypeScript integration tests
    needs: typescript
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/typescript/mcp-server
        run: npm ci

      - name: Rebuild native addons
        working-directory: src/typescript/mcp-server
        run: npm rebuild better-sqlite3

      - name: Build
        working-directory: src/typescript/mcp-server
        run: npm run build

      - name: Integration tests (live services)
        working-directory: src/typescript/mcp-server
        run: npm test -- --include 'tests/integration/**' --reporter=verbose

  # memexd control-port discipline (spec 16 §10.1).
  # Verifies the cross-process single-instance lock primitive in
  # isolation: builds the example holder, runs the unit + cross-process
  # integration tests serially (they touch process-shared ports).
  control-port:
    name: memexd control-port (spec 16 §10.1)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev cmake liblzma-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ubuntu-latest-cargo-control-port-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-

      - name: Build example holder
        working-directory: src/rust
        run: cargo build --package memexd --examples

      - name: Clippy (memexd, all targets, -D warnings)
        working-directory: src/rust
        run: cargo clippy --package memexd --all-targets -- -D warnings

      - name: Unit tests (control_port module)
        working-directory: src/rust
        run: cargo test --package memexd --lib control_port -- --test-threads=1

      - name: Integration tests (cross-process double-bind, identity stamp)
        working-directory: src/rust
        run: cargo test --package memexd --test control_port_cross_process -- --test-threads=1
