# Cross-platform release build workflow for workspace-qdrant-mcp
# Builds memexd daemon and wqm CLI for 6 target platforms
#
# ONNX Runtime Static Linking:
# - Most platforms: ort crate automatically downloads prebuilt static binaries
# - Intel Mac (x86_64-apple-darwin): ort crate dropped support in v2.0.0-rc.11,
#   so we download Microsoft's ONNX Runtime and set ORT_LIB_LOCATION
#
# All binaries are self-contained with ONNX Runtime statically linked.
# See: docs/specs/11-grammar-runtime.md for ONNX Runtime static linking details
#
# Targets:
# - ARM Mac (aarch64-apple-darwin)
# - Intel Mac (x86_64-apple-darwin) - requires manual ONNX Runtime
# - ARM Windows (aarch64-pc-windows-msvc)
# - Intel Windows (x86_64-pc-windows-msvc)
# - Linux x86_64 (x86_64-unknown-linux-gnu)
# - Linux ARM (aarch64-unknown-linux-gnu)

name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: false
        default: 'test'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # ONNX Runtime version for Intel Mac (only platform that needs manual download)
  ORT_VERSION: "1.23.2"
  # Pinned SHA256 digests for downloaded build inputs (#129). Update these
  # together with the corresponding version bumps — a mismatch fails the build.
  ORT_SHA256: "4b098c19e7bf1670facb26afeb77162423bc41383e7630fb0827c4ba81c971ab"
  PROTOC_VERSION: "25.3"
  PROTOC_SHA256_X86_64: "f853e691868d0557425ea290bf7ba6384eef2fa9b04c323afab49a770ba9da80"
  PROTOC_SHA256_AARCH_64: "9eae1f20f70cccc912d1c318c3929b86aebf5afd4b0f32c196ef682c222ed5ae"
  # Homebrew/install pinned to a reviewed commit instead of HEAD.
  BREW_INSTALL_COMMIT: "93a25fd2d2fdb86422303c292b9223f84ef23eaf"
  BREW_INSTALL_SHA256: "17f204b128869ec71e6b650051f1e65ef5b74cf994c2ff8b919103241554dd2f"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon) - ort has prebuilt binaries
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: darwin-arm64
            needs_ort_download: false

          # macOS Intel - cross-compiled on ARM runner (macos-13 deprecated)
          # ORT universal2 static lib covers both architectures
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: darwin-x64
            needs_ort_download: true

          # Windows x64 - ort has prebuilt binaries
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: windows-x64
            needs_ort_download: false

          # Windows ARM64 - Rust cross-compiles to ARM64 on x64 runner
          # Smoke test is skipped: ARM64 binaries cannot run on x64 runner
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_name: windows-arm64
            needs_ort_download: false
            skip_smoke_test: true

          # Linux x64 - ubuntu-latest for ORT ABI compatibility
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: linux-x64
            needs_ort_download: false

          # Linux ARM64 - native build on ARM runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            needs_ort_download: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # macOS specific: Install dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake protobuf

      # Linux specific: Install dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake liblzma-dev
          # Install protoc from GitHub releases (apt version on ubuntu-22.04 is too old for proto3 optional)
          PROTOC_ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch_64/')
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-${PROTOC_ARCH}.zip" -o /tmp/protoc.zip
          # Verify the pinned digest before extracting (#129)
          case "$PROTOC_ARCH" in
            x86_64)   expected="$PROTOC_SHA256_X86_64" ;;
            aarch_64) expected="$PROTOC_SHA256_AARCH_64" ;;
          esac
          echo "${expected}  /tmp/protoc.zip" | sha256sum -c -
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          rm /tmp/protoc.zip

      # Windows specific: Install dependencies
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install protoc cmake -y

      # Cache Rust dependencies
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.target }}-cargo-

      # Download ONNX Runtime static library for Intel Mac (ort crate handles other platforms)
      # Uses supertone-inc/onnxruntime-build which provides static libraries (.a)
      - name: Cache ONNX Runtime (Intel Mac)
        if: matrix.needs_ort_download
        uses: actions/cache@v4
        id: onnx-cache
        with:
          path: ~/.onnxruntime-static
          key: onnxruntime-static-${{ env.ORT_VERSION }}-${{ matrix.target }}

      - name: Download ONNX Runtime static library (Intel Mac)
        if: matrix.needs_ort_download && steps.onnx-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/.onnxruntime-static
          echo "Downloading ONNX Runtime ${{ env.ORT_VERSION }} static library for Intel Mac..."
          # Download from supertone-inc/onnxruntime-build (provides static libraries)
          curl -L "https://github.com/supertone-inc/onnxruntime-build/releases/download/v${{ env.ORT_VERSION }}/onnxruntime-osx-universal2-static_lib-${{ env.ORT_VERSION }}.tgz" -o ~/.onnxruntime-static/ort.tgz
          # Verify the pinned digest before linking this into shipped binaries (#129)
          echo "${{ env.ORT_SHA256 }}  $HOME/.onnxruntime-static/ort.tgz" | shasum -a 256 -c -
          tar xzf ~/.onnxruntime-static/ort.tgz -C ~/.onnxruntime-static
          rm ~/.onnxruntime-static/ort.tgz
          echo "ONNX Runtime static library downloaded to ~/.onnxruntime-static"
          ls -la ~/.onnxruntime-static/lib/

      # Set ORT environment for Intel Mac static linking
      - name: Set ORT environment (Intel Mac)
        if: matrix.needs_ort_download
        shell: bash
        run: |
          # Intel Mac: Use static library for truly self-contained binary
          # Point to lib subdirectory where libonnxruntime.a is located
          echo "ORT_LIB_LOCATION=$HOME/.onnxruntime-static/lib" >> $GITHUB_ENV
          echo "Set ORT_LIB_LOCATION=$HOME/.onnxruntime-static/lib for static linking"

      # Install x86_64 OpenSSL for Intel Mac cross-compilation via Rosetta
      - name: Install x86_64 OpenSSL (Intel Mac cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            # Pin the Homebrew installer to a reviewed commit and verify its
            # digest instead of executing HEAD blindly (#129)
            curl -fsSL "https://raw.githubusercontent.com/Homebrew/install/${{ env.BREW_INSTALL_COMMIT }}/install.sh" -o /tmp/brew-install.sh
            echo "${{ env.BREW_INSTALL_SHA256 }}  /tmp/brew-install.sh" | shasum -a 256 -c -
            arch -x86_64 /bin/bash -c "NONINTERACTIVE=1 /bin/bash /tmp/brew-install.sh"
            rm /tmp/brew-install.sh
          fi
          arch -x86_64 /usr/local/bin/brew install openssl@3
          OPENSSL_PREFIX=$(arch -x86_64 /usr/local/bin/brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> $GITHUB_ENV

      - name: Build
        working-directory: src/rust
        run: cargo build --release --target ${{ matrix.target }}

      # Prepare artifacts - all binaries are self-contained with ONNX Runtime statically linked
      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp src/rust/target/${{ matrix.target }}/release/memexd artifacts/
          cp src/rust/target/${{ matrix.target }}/release/wqm artifacts/
          cp src/rust/target/${{ matrix.target }}/release/workspace-qdrant-mcp artifacts/
          cp THIRD-PARTY-LICENSES.md artifacts/
          cp LICENSE artifacts/

          # Create archive
          cd artifacts
          tar -czvf ../workspace-qdrant-mcp-${{ matrix.artifact_name }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item src/rust/target/${{ matrix.target }}/release/memexd.exe artifacts/
          Copy-Item src/rust/target/${{ matrix.target }}/release/wqm.exe artifacts/
          Copy-Item src/rust/target/${{ matrix.target }}/release/workspace-qdrant-mcp.exe artifacts/
          Copy-Item THIRD-PARTY-LICENSES.md artifacts/
          Copy-Item LICENSE artifacts/

          Compress-Archive -Path artifacts/* -DestinationPath workspace-qdrant-mcp-${{ matrix.artifact_name }}.zip

      # Verify binaries are self-contained (no unexpected dynamic dependencies)
      - name: Verify binary dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: scripts/verify-deps-macos.sh artifacts/memexd artifacts/wqm artifacts/workspace-qdrant-mcp

      - name: Verify binary dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/verify-deps-linux.sh artifacts/memexd artifacts/wqm artifacts/workspace-qdrant-mcp

      - name: Verify binary dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/verify-deps-windows.ps1 artifacts/memexd.exe artifacts/wqm.exe artifacts/workspace-qdrant-mcp.exe

      # Smoke tests - verify binaries are runnable
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Running smoke tests..."
          artifacts/memexd --version
          artifacts/wqm --version
          artifacts/workspace-qdrant-mcp --version
          echo "Smoke tests passed"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows' && !matrix.skip_smoke_test
        shell: pwsh
        run: |
          Write-Host "Running smoke tests..."
          & artifacts/memexd.exe --version
          & artifacts/wqm.exe --version
          & artifacts/workspace-qdrant-mcp.exe --version
          Write-Host "Smoke tests passed"

      # Build a Debian package for amd64/arm64 Linux. cargo-deb reads
      # [package.metadata.deb] from src/rust/cli/Cargo.toml; we
      # pre-position both binaries under src/rust/target/release/ so
      # the asset list in the manifest resolves correctly under
      # cross-compiled targets.
      - name: Install cargo-deb
        if: runner.os == 'Linux' && (matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu')
        shell: bash
        run: cargo install cargo-deb --version 2.5.0 --locked

      - name: Build .deb package
        if: runner.os == 'Linux' && (matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu')
        shell: bash
        run: |
          mkdir -p src/rust/target/release
          cp src/rust/target/${{ matrix.target }}/release/wqm src/rust/target/release/wqm
          cp src/rust/target/${{ matrix.target }}/release/memexd src/rust/target/release/memexd
          cp src/rust/target/${{ matrix.target }}/release/workspace-qdrant-mcp src/rust/target/release/workspace-qdrant-mcp
          deb_arch=$(case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  echo amd64 ;;
            aarch64-unknown-linux-gnu) echo arm64 ;;
          esac)
          cargo deb --no-build -p wqm-cli --target ${{ matrix.target }} \
            --output "workspace-qdrant-mcp_${{ github.ref_name }}_${deb_arch}.deb"
          sha256sum "workspace-qdrant-mcp_${{ github.ref_name }}_${deb_arch}.deb" \
            | awk '{print $1}' \
            > "workspace-qdrant-mcp_${{ github.ref_name }}_${deb_arch}.deb.sha256"

      # Create individual binary files for direct download (used by wqm update)
      - name: Prepare individual binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Copy daemon binary with target-specific name
          cp artifacts/memexd memexd-${{ matrix.target }}

          # Generate checksum for individual binary
          sha256sum memexd-${{ matrix.target }} | awk '{print $1}' > memexd-${{ matrix.target }}.sha256

          # Also prepare CLI binary
          cp artifacts/wqm wqm-${{ matrix.target }}
          sha256sum wqm-${{ matrix.target }} | awk '{print $1}' > wqm-${{ matrix.target }}.sha256

          # And the MCP server binary
          cp artifacts/workspace-qdrant-mcp workspace-qdrant-mcp-${{ matrix.target }}
          sha256sum workspace-qdrant-mcp-${{ matrix.target }} | awk '{print $1}' > workspace-qdrant-mcp-${{ matrix.target }}.sha256

      - name: Prepare individual binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Copy daemon binary with target-specific name
          Copy-Item artifacts/memexd.exe memexd-${{ matrix.target }}.exe

          # Generate checksum for individual binary
          $hash = (Get-FileHash -Algorithm SHA256 memexd-${{ matrix.target }}.exe).Hash.ToLower()
          $hash | Out-File -NoNewline memexd-${{ matrix.target }}.exe.sha256

          # Also prepare CLI binary
          Copy-Item artifacts/wqm.exe wqm-${{ matrix.target }}.exe
          $hash = (Get-FileHash -Algorithm SHA256 wqm-${{ matrix.target }}.exe).Hash.ToLower()
          $hash | Out-File -NoNewline wqm-${{ matrix.target }}.exe.sha256

          # And the MCP server binary
          Copy-Item artifacts/workspace-qdrant-mcp.exe workspace-qdrant-mcp-${{ matrix.target }}.exe
          $hash = (Get-FileHash -Algorithm SHA256 workspace-qdrant-mcp-${{ matrix.target }}.exe).Hash.ToLower()
          $hash | Out-File -NoNewline workspace-qdrant-mcp-${{ matrix.target }}.exe.sha256

      # Upload artifacts
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: workspace-qdrant-mcp-${{ matrix.artifact_name }}
          path: |
            workspace-qdrant-mcp-${{ matrix.artifact_name }}.tar.gz
            memexd-${{ matrix.target }}
            memexd-${{ matrix.target }}.sha256
            wqm-${{ matrix.target }}
            wqm-${{ matrix.target }}.sha256
            workspace-qdrant-mcp-${{ matrix.target }}
            workspace-qdrant-mcp-${{ matrix.target }}.sha256
            workspace-qdrant-mcp_*.deb
            workspace-qdrant-mcp_*.deb.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: workspace-qdrant-mcp-${{ matrix.artifact_name }}
          path: |
            workspace-qdrant-mcp-${{ matrix.artifact_name }}.zip
            memexd-${{ matrix.target }}.exe
            memexd-${{ matrix.target }}.exe.sha256
            wqm-${{ matrix.target }}.exe
            wqm-${{ matrix.target }}.exe.sha256
            workspace-qdrant-mcp-${{ matrix.target }}.exe
            workspace-qdrant-mcp-${{ matrix.target }}.exe.sha256

  # Create release with all artifacts
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          # Checksum for archives + .deb packages
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.deb.sha256
            artifacts/**/memexd-*
            artifacts/**/wqm-*
            artifacts/**/workspace-qdrant-mcp-*
            artifacts/checksums.txt
          draft: false
          overwrite_files: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          body: |
            ## Self-Contained Binaries

            All binaries include ONNX Runtime statically linked - no external dependencies required.

            Each archive includes `LICENSE` and `THIRD-PARTY-LICENSES.md` with full attribution for all third-party dependencies.

            ### Quick Install
            ```bash
            # Linux/macOS
            curl -fsSL https://raw.githubusercontent.com/ChrisGVE/workspace-qdrant-mcp/main/scripts/download-install.sh | bash

            # Windows (PowerShell)
            irm https://raw.githubusercontent.com/ChrisGVE/workspace-qdrant-mcp/main/scripts/download-install.ps1 | iex
            ```

            ### Manual Download
            Choose the appropriate archive for your platform:
            - `darwin-arm64` - macOS Apple Silicon (M1/M2/M3)
            - `darwin-x64` - macOS Intel
            - `linux-x64` - Linux x86_64
            - `linux-arm64` - Linux ARM64
            - `windows-x64` - Windows x86_64
            - `windows-arm64` - Windows ARM64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract per-platform checksums
        id: checksums
        run: |
          cd artifacts
          # Extract SHA256 for each platform tarball
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            sha=$(grep "workspace-qdrant-mcp-${platform}.tar.gz" checksums.txt | awk '{print $1}')
            key=$(echo "$platform" | tr '-' '_')
            echo "${key}=${sha}" >> $GITHUB_OUTPUT
          done
          # Windows zips (used to stamp the winget manifest)
          for platform in windows-x64 windows-arm64; do
            sha=$(grep "workspace-qdrant-mcp-${platform}.zip" checksums.txt | awk '{print $1}')
            key=$(echo "$platform" | tr '-' '_')
            echo "${key}=${sha}" >> $GITHUB_OUTPUT
          done

      # Stamp the Homebrew formula and winget manifest templates with the
      # release version + artifact digests, and attach them to the release —
      # these channels are not usable with placeholder hashes (#129).
      - name: Checkout repository (manifest templates)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Stamp package manifests
        run: |
          VERSION="${{ github.ref_name }}"
          BARE_VERSION="${VERSION#v}"
          mkdir -p stamped-manifests

          sed -e "s/PLACEHOLDER_VERSION/${BARE_VERSION}/g" \
              -e "s|# sha256 \"PLACEHOLDER_DARWIN_ARM64\"|sha256 \"${{ steps.checksums.outputs.darwin_arm64 }}\"|" \
              -e "s|# sha256 \"PLACEHOLDER_DARWIN_X64\"|sha256 \"${{ steps.checksums.outputs.darwin_x64 }}\"|" \
              -e "s|# sha256 \"PLACEHOLDER_LINUX_ARM64\"|sha256 \"${{ steps.checksums.outputs.linux_arm64 }}\"|" \
              -e "s|# sha256 \"PLACEHOLDER_LINUX_X64\"|sha256 \"${{ steps.checksums.outputs.linux_x64 }}\"|" \
              repo/Formula/workspace-qdrant-mcp.rb \
              > stamped-manifests/workspace-qdrant-mcp.rb

          sed -e "s/PLACEHOLDER_VERSION/${BARE_VERSION}/g" \
              -e "s/PLACEHOLDER_WINDOWS_X64/${{ steps.checksums.outputs.windows_x64 }}/" \
              -e "s/PLACEHOLDER_WINDOWS_ARM64/${{ steps.checksums.outputs.windows_arm64 }}/" \
              repo/manifests/winget/workspace-qdrant-mcp.yaml \
              > stamped-manifests/winget-workspace-qdrant-mcp.yaml

          # Fail loudly if any placeholder survived the stamping.
          if grep -rn "PLACEHOLDER" stamped-manifests/; then
            echo "ERROR: unstamped placeholders remain in package manifests"
            exit 1
          fi

      - name: Attach stamped manifests to release
        uses: softprops/action-gh-release@v2
        with:
          files: stamped-manifests/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch Homebrew tap update
        if: "!contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, 'nightly')"
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_DISPATCH_TOKEN }}
          repository: ChrisGVE/homebrew-tap
          event-type: release-published
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "darwin_arm64_sha256": "${{ steps.checksums.outputs.darwin_arm64 }}",
              "darwin_x64_sha256": "${{ steps.checksums.outputs.darwin_x64 }}",
              "linux_x64_sha256": "${{ steps.checksums.outputs.linux_x64 }}",
              "linux_arm64_sha256": "${{ steps.checksums.outputs.linux_arm64 }}"
            }
