# =============================================================================
# GIT INTEGRATION CONFIGURATION
# =============================================================================
# Purpose: Configures Git-specific features including branch lifecycle management
# and repository monitoring for tracked projects.
#
# Branch Lifecycle: Tracks branch creation, deletion, rename, and default changes
# Document Management: Auto-manages Qdrant documents when branches change

# =============================================================================
# GIT INTEGRATION CONFIGURATION
# =============================================================================
# Purpose: Configures Git-specific features including branch lifecycle management
# and repository monitoring for tracked projects.
#
# Branch Lifecycle: Tracks branch creation, deletion, rename, and default changes
# Document Management: Auto-manages Qdrant documents when branches change
git:
  # track_branch_lifecycle: Enable branch lifecycle monitoring
  # Purpose: Master toggle for branch creation/deletion/rename detection
  # When enabled: Watches .git/refs/heads/ for branch changes
  # When disabled: No branch lifecycle events emitted
  # Use case: Enable for projects where branch-specific document isolation matters
  # Format: Boolean
  # Default reasoning: true provides comprehensive Git integration
  track_branch_lifecycle: true

  # auto_delete_branch_documents: Auto-delete documents when branch is deleted
  # Purpose: Automatically remove Qdrant documents for deleted branches
  # Cleanup: Prevents orphaned documents from deleted feature branches
  # Use case: Disable if you want to preserve documents after branch deletion
  # Memory: Reduces storage usage by cleaning up old branch data
  # Format: Boolean
  # Default reasoning: true keeps Qdrant clean and reduces storage
  auto_delete_branch_documents: true

  # branch_scan_interval_seconds: Interval for scanning branch changes
  # Purpose: How often to check .git/refs/heads/ for branch changes
  # Responsiveness: Lower values detect changes faster but increase I/O
  # Balance: Higher values reduce overhead but delay detection
  # Event-driven: This is a fallback; file watchers provide immediate detection
  # Format: Integer seconds > 0
  # Default reasoning: 5 seconds provides responsive detection with low overhead
  branch_scan_interval_seconds: 5

  # rename_correlation_timeout_ms: Timeout for correlating branch rename events
  # Purpose: Maximum time to wait before treating delete as permanent (not rename)
  # Rename detection: Delete followed by create with same commit = rename
  # Responsiveness: Lower timeout means faster delete event emission
  # False positive: Too short may miss legitimate renames during slow operations
  # Format: Integer milliseconds > 0
  # Default reasoning: 500ms handles most Git operations while staying responsive
  rename_correlation_timeout_ms: 500

  # default_branch_detection: How to detect the default branch
  # Purpose: Determines strategy for identifying repository default branch
  # Options:
  #   - "head": Read .git/HEAD file
  #   - "remote": Query remote (origin/HEAD)
  #   - "config": Read init.defaultBranch from git config
  # Fallback: If detection fails, defaults to "main" then "master"
  # Format: String enum
  # Default reasoning: "head" is fastest and most reliable for local operations
  default_branch_detection: "head"

# =============================================================================
# LSP (LANGUAGE SERVER PROTOCOL) INTEGRATION CONFIGURATION
# =============================================================================
# Purpose: Configures Language Server Protocol integration for active projects.
# LSP provides code intelligence features like references, type information,
# and import resolution for semantic chunks.
#
# Note: LSP is only active for projects that are currently being worked on.
# Servers are started on project activation and stopped on deactivation.

# =============================================================================
# LSP (LANGUAGE SERVER PROTOCOL) INTEGRATION CONFIGURATION
# =============================================================================
# Purpose: Configures Language Server Protocol integration for active projects.
# LSP provides code intelligence features like references, type information,
# and import resolution for semantic chunks.
#
# Note: LSP is only active for projects that are currently being worked on.
# Servers are started on project activation and stopped on deactivation.
lsp:
  # user_path: PATH environment variable for finding language servers
  # Purpose: Allows daemon to find language servers installed in user locations
  # Usage: CLI stores user's PATH here on first run
  # Resolution: Daemon prepends this to its own PATH on startup
  # Format: Colon-separated list of directories (Unix) or semicolon (Windows)
  # Default reasoning: null until CLI stores user's PATH
  user_path: null

  # max_servers_per_project: Maximum LSP servers per active project
  # Purpose: Limits memory usage from concurrent language servers
  # Multi-language projects: Projects with many languages may hit this limit
  # Server priority: Most-used languages get servers first
  # Format: Integer > 0
  # Default reasoning: 3 covers most common multi-language projects
  max_servers_per_project: 3

  # auto_start_on_activation: Auto-start servers when project becomes active
  # Purpose: Controls whether LSP servers start automatically on project activation
  # When enabled: Servers start immediately for detected languages
  # When disabled: Manual server start required via CLI
  # Format: Boolean
  # Default reasoning: true provides seamless code intelligence
  auto_start_on_activation: true

  # deactivation_delay_secs: Delay before stopping servers after project deactivation
  # Purpose: Prevents server churn during brief context switches
  # Resource usage: Longer delays keep servers running longer
  # Responsiveness: Shorter delays free resources faster
  # Format: Integer seconds > 0
  # Default reasoning: 60 seconds handles brief task switches
  deactivation_delay_secs: 60

  # enable_enrichment_cache: Cache LSP query results
  # Purpose: Reduces redundant LSP queries for the same symbols
  # Memory usage: Cache grows with number of queried symbols
  # Accuracy: Stale cache entries may have outdated info
  # Format: Boolean
  # Default reasoning: true improves performance for repeated queries
  enable_enrichment_cache: true

  # cache_ttl_secs: Time-to-live for cached enrichment data
  # Purpose: How long to keep cached LSP query results
  # Freshness: Shorter TTL means fresher data, more queries
  # Performance: Longer TTL reduces LSP load
  # Format: Integer seconds > 0
  # Default reasoning: 300 seconds (5 min) balances freshness and performance
  cache_ttl_secs: 300

  # startup_timeout_secs: Timeout for server startup and initialization
  # Purpose: Maximum time to wait for LSP server to become ready
  # Fast servers: Most servers initialize in under 5 seconds
  # Slow servers: Java (jdtls) may take longer for large projects
  # Format: Integer seconds > 0
  # Default reasoning: 30 seconds handles most servers
  startup_timeout_secs: 30

  # request_timeout_secs: Timeout for individual LSP requests
  # Purpose: Maximum time to wait for LSP query responses
  # Simple queries: References, hover usually respond in < 1 second
  # Complex queries: Large codebases may take longer
  # Format: Integer seconds > 0
  # Default reasoning: 10 seconds handles typical queries
  request_timeout_secs: 10

  # health_check_interval_secs: Interval between server health checks
  # Purpose: How often to verify LSP servers are responding
  # Detection: Catches crashed or unresponsive servers
  # Overhead: More frequent checks add slight overhead
  # Format: Integer seconds > 0
  # Default reasoning: 60 seconds balances detection speed and overhead
  health_check_interval_secs: 60

  # max_restart_attempts: Maximum server restart attempts before giving up
  # Purpose: Limits restart attempts for consistently failing servers
  # Crash loops: Prevents infinite restart loops
  # Recovery: Allows recovery from transient failures
  # Format: Integer >= 0
  # Default reasoning: 3 attempts allows recovery from transient issues
  max_restart_attempts: 3

  # restart_backoff_multiplier: Exponential backoff multiplier for restarts
  # Purpose: Increases delay between restart attempts
  # Crash loops: Prevents rapid restart attempts for persistent failures
  # Recovery window: Allows time for transient issues to resolve
  # Format: Float >= 1.0
  # Default reasoning: 2.0 doubles delay after each failure
  restart_backoff_multiplier: 2.0

# =============================================================================
# TREE-SITTER GRAMMAR CONFIGURATION
# =============================================================================
# Purpose: Configures dynamic tree-sitter grammar loading for semantic code
# chunking. Instead of statically compiled grammars, grammars are loaded from
# shared library files (.so/.dylib/.dll) at runtime, allowing languages to be
# added without recompiling the daemon.
#
# Note: Grammars must be compatible with the tree-sitter runtime version
# specified below. Incompatible grammars will be detected and can be
# auto-replaced if auto_download is enabled.

# =============================================================================
# TREE-SITTER GRAMMAR CONFIGURATION
# =============================================================================
# Purpose: Configures dynamic tree-sitter grammar loading for semantic code
# chunking. Instead of statically compiled grammars, grammars are loaded from
# shared library files (.so/.dylib/.dll) at runtime, allowing languages to be
# added without recompiling the daemon.
#
# Note: Grammars must be compatible with the tree-sitter runtime version
# specified below. Incompatible grammars will be detected and can be
# auto-replaced if auto_download is enabled.
grammars:
  # cache_dir: Directory for storing grammar shared libraries
  # Purpose: Location where tree-sitter grammar files are cached
  # Structure: <cache_dir>/<platform>/<tree_sitter_version>/<language>/
  # Example: ~/.cache/workspace-qdrant/grammars/x86_64-apple-darwin/0.24/rust/
  # Platform: Automatically detected (x86_64, aarch64, etc.)
  # Permissions: Directory must be writable by daemon process
  # Format: Directory path with shell expansion (~, $HOME, etc.)
  # Default reasoning: Standard location under workspace-qdrant config directory
  cache_dir: "~/.cache/workspace-qdrant/grammars"

  # required: List of language grammars to pre-download on daemon startup
  # Purpose: Grammars listed here are downloaded eagerly at startup
  # Default: Empty — grammars are downloaded on first use via auto_download
  # Use case: Pre-populate cache for offline environments or faster first-file processing
  # Format: List of language identifiers (lowercase)
  # Example: [rust, python, javascript, typescript, go, java, c, cpp]
  required: []

  # auto_download: Automatically download missing grammars
  # Purpose: Controls whether missing grammars are fetched from download sources
  # When enabled: Missing required grammars downloaded on daemon startup
  # When disabled: Missing grammars logged as warnings, parsing falls back to text
  # Security: Downloads verified by checksum before use
  # Offline mode: Disable for air-gapped environments
  # Format: Boolean
  # Default reasoning: true provides seamless setup experience
  auto_download: true

  # tree_sitter_version: "0.26"
  # Purpose: Specifies the tree-sitter runtime version for grammar compatibility
  # Compatibility: Grammars must be built for this tree-sitter version
  # Mismatch handling: Incompatible grammars auto-replaced if auto_download=true
  # Version format: Major.Minor (e.g., "0.24")
  # Important: Must match tree-sitter version in Cargo.toml
  # Format: String version number
  # Default reasoning: Matches current tree-sitter dependency version
  tree_sitter_version: "0.26"

  # download_base_url: Base URL template for grammar downloads
  # Purpose: Where to download grammar shared libraries from
  # Template variables:
  #   {language} - Language name (e.g., "rust", "python")
  #   {version} - Grammar version
  #   {platform} - Platform triple (e.g., "x86_64-apple-darwin")
  #   {ext} - Library extension (.so, .dylib, .dll)
  # Custom sources: Change to internal mirror for corporate environments
  # Format: URL template string
  # Default reasoning: Official tree-sitter grammar release URLs
  download_base_url: "https://github.com/tree-sitter/tree-sitter-{language}/releases/download/v{version}/tree-sitter-{language}-{platform}.{ext}"

  # verify_checksums: Verify downloaded grammar checksums
  # Purpose: Ensures downloaded grammars are authentic and uncorrupted
  # Security: Prevents use of tampered or corrupted grammar files
  # Checksum source: Metadata file alongside grammar in cache directory
  # Format: Boolean
  # Default reasoning: true for security
  verify_checksums: true

  # lazy_loading: Load grammars on first use instead of at startup
  # Purpose: Controls when grammars are loaded into memory
  # When enabled: Grammars loaded only when a file of that language is processed
  # When disabled: All required grammars loaded at daemon startup
  # Memory: Lazy loading reduces initial memory footprint
  # Latency: First parse of a language may have slight delay
  # Format: Boolean
  # Default reasoning: true for better resource usage in typical scenarios
  lazy_loading: true

  # check_interval_hours: Interval to check for grammar updates
  # Purpose: Controls how often daemon checks for newer grammar versions
  # When set: Periodic background checks for grammar updates
  # Set to 0: Disable automatic update checks
  # Format: Integer (hours)
  # Default reasoning: 168 (weekly) balances freshness with network traffic
  check_interval_hours: 168

  # idle_update_check_enabled: Enable idle-time grammar and LSP update checks
  # Purpose: Automatically check for grammar and LSP updates when system is idle
  # Idle detection: Queue continuously empty for idle_update_check_delay_secs
  # Grammar updates: Downloads newer grammar versions automatically
  # LSP updates: Logs available updates (user installs manually via wqm language)
  # Frequency: Respects check_interval_hours to avoid excessive checks
  # Format: Boolean
  # Default reasoning: true provides hands-off maintenance
  idle_update_check_enabled: true

  # idle_update_check_delay_secs: Idle delay before triggering update check
  # Purpose: Prevents update checks during active file processing
  # Trigger: Queue must be continuously empty for this duration
  # Interruption: Check aborts immediately if new queue items arrive
  # Range: 1-3600 seconds
  # Format: Integer (seconds)
  # Default reasoning: 300 (5 minutes) avoids checks during brief pauses
  idle_update_check_delay_secs: 300

# =============================================================================
# LANGUAGE REGISTRY CONFIGURATION
# =============================================================================
# Purpose: Configures the dynamic language registry that provides language
# definitions (extensions, grammar repos, semantic patterns, LSP servers)
# from multiple upstream sources merged by priority.
#
# The registry replaces all hardcoded language support. Adding a new language
# requires only a YAML definition — no code changes.

# =============================================================================
# DAEMON SELF-UPDATE CONFIGURATION
# =============================================================================
# Purpose: Controls how the daemon checks for and applies updates.
# The daemon can automatically check for new versions and either notify
# the user or automatically download and install updates.
updates:
  # auto_check: Check for updates on daemon startup
  # Purpose: Whether daemon should check for new versions when starting
  # When enabled: Daemon contacts update server on startup
  # When disabled: No automatic version checks
  # Manual check: Can always use 'wqm update --check' CLI command
  # Format: Boolean
  # Default reasoning: true keeps users informed of important updates
  auto_check: true

  # channel: Update channel to follow
  # Purpose: Controls which release stream daemon follows for updates
  # Options:
  #   - stable: Production releases only (recommended)
  #   - beta: Include beta releases for early access to features
  #   - dev: Include development builds (may be unstable)
  # Format: String (stable, beta, dev)
  # Default reasoning: stable for production reliability
  channel: stable

  # notify_only: Only notify about updates, don't auto-install
  # Purpose: Controls whether updates are automatically applied
  # When true: Updates announced but user must run 'wqm update install'
  # When false: Updates automatically downloaded and installed
  # Safety: Recommended true for production systems
  # Format: Boolean
  # Default reasoning: true for user control over when updates are applied
  notify_only: true

  # check_interval_hours: Interval to check for daemon updates
  # Purpose: How often to check for new daemon versions (when auto_check=true)
  # Set to 0: Only check on startup
  # Format: Integer (hours)
  # Default reasoning: 24 (daily) balances awareness with network traffic
  check_interval_hours: 24

# =============================================================================
# TAGGING CONFIGURATION
# =============================================================================
# Purpose: Controls LLM-assisted tag extraction (Tier 3). This is the
# highest-quality but most expensive tagging tier — disabled by default.
# When enabled, document chunks are sent to an AI provider to extract
# structured concept tags.

# =============================================================================
# TAGGING CONFIGURATION
# =============================================================================
# Purpose: Controls LLM-assisted tag extraction (Tier 3). This is the
# highest-quality but most expensive tagging tier — disabled by default.
# When enabled, document chunks are sent to an AI provider to extract
# structured concept tags.
tagging:
  tier3:
    # enabled: Master switch for LLM-assisted tagging
    # Purpose: When false, no LLM calls are made and no tags are extracted
    # Cost: Each document processes up to max_chunks_per_doc LLM calls
    # Format: Boolean
    # Default reasoning: false — opt-in only when a provider is configured
    enabled: false

    # primary: Main LLM provider configuration
    primary:
      # provider: LLM provider name
      # Options: "anthropic", "openai", "google", "ollama"
      provider: "anthropic"

      # access_mode: How to access the provider
      # "cli" — shell out to provider CLI tool (uses existing subscription, no API key)
      # "api" — direct HTTP with API key (pay-per-token)
      # Note: ollama always uses HTTP regardless of this setting
      access_mode: "cli"

      # model: Provider-specific model identifier
      model: "claude-haiku-4-5-20251001"

      # api_key_env: Environment variable name for the API key (api mode only)
      api_key_env: "ANTHROPIC_API_KEY"

      # base_url: Custom endpoint override (optional)
      # Use for Azure OpenAI, self-hosted proxies, or compatible endpoints
      # When null, uses the provider's default URL
      # base_url: "https://custom-endpoint.example.com"

    # fallback: Backup provider when primary fails (optional)
    # Uncomment to enable fallback:
    # fallback:
    #   provider: "ollama"
    #   access_mode: "api"
    #   model: "llama3.2"

    # max_chunks_per_doc: Maximum chunks per document to send to the LLM
    # Higher values improve tag quality but increase cost
    # Format: Integer
    max_chunks_per_doc: 10

    # max_tags_per_chunk: Maximum tags to request per chunk
    # Format: Integer
    max_tags_per_chunk: 5

    # timeout_secs: Per-request timeout in seconds
    # Format: Integer
    timeout_secs: 15

    # max_retries: Retries per provider before switching to fallback
    # Format: Integer
    max_retries: 2

    # rate_limit_rps: Maximum requests per second across all chunks
    # Format: Integer
    rate_limit_rps: 10

    # temperature: LLM sampling temperature (lower = more deterministic)
    # Format: Float 0.0–1.0
    temperature: 0.3

    # total_budget_secs: Hard wall-clock ceiling for the entire extract_tags() call
    # Purpose: Prevents a slow/down provider from blocking the ingestion pipeline
    # When exceeded: Remaining chunks are skipped, partial results returned
    # Format: Integer (seconds)
    # Default reasoning: 60s is generous for 10 chunks but prevents multi-minute stalls
    total_budget_secs: 60

    # max_consecutive_failures: Circuit breaker — abort after N consecutive chunk failures
    # Purpose: If the provider is down, stop wasting time on subsequent chunks
    # When triggered: Remaining chunks skipped, partial results returned
    # Format: Integer
    # Default reasoning: 2 consecutive failures strongly suggests provider is unreachable
    max_consecutive_failures: 2

# =============================================================================
# INGESTION LIMITS CONFIGURATION
# =============================================================================
# Per-extension size limits to prevent large data/config files from blocking
# queue processing. Limits are in KB. Remove an entry to remove the limit.
# Add any extension to restrict it. 0 = skip all files with that extension.
#
# Rationale: Configuration and structured-data files should never legitimately
# exceed 500KB. Larger files are likely training datasets or generated output
# that should not be embedded. The 100MB global hard limit remains as a backstop.

# =============================================================================
# URL INGESTION CONFIGURATION
# =============================================================================
# Purpose: Configures HTTP fetch limits and SSRF policy for URL-based ingestion.
# Controls timeout, redirect following, payload size, and network access scope.
url_ingestion:
  # connect_timeout_secs: TCP connection timeout in seconds
  # Format: Integer > 0
  connect_timeout_secs: 15

  # read_timeout_secs: Maximum time to read the response body in seconds
  # Format: Integer > 0
  read_timeout_secs: 60

  # max_redirects: Maximum number of HTTP redirects to follow
  # Set to 0 to disable redirect following
  # Format: Integer >= 0
  max_redirects: 5

  # max_body_bytes: Maximum response body size in bytes
  # Requests whose response exceeds this are aborted
  # Default: 10MB
  # Format: Integer > 0
  max_body_bytes: 10485760

  # allow_private_networks: Whether to allow fetching from private/loopback addresses
  # Security: Keep false in production to prevent SSRF attacks
  # Format: Boolean
  allow_private_networks: false

  # allowed_content_types: Content-type prefix allowlist
  # Only responses whose Content-Type starts with one of these values are accepted
  # Format: List of strings
  allowed_content_types:
    - "text/"
    - "application/json"
    - "application/xhtml+xml"
    - "application/xml"


# =============================================================================
# MOUNT MAP CONFIGURATION
# =============================================================================
# Purpose: Maps host-side filesystem paths to container-side paths so that the
# same canonical path is used in SQLite, Qdrant, and gRPC regardless of
# whether the daemon runs natively on the host or inside a container.
#
# Schema (see docs/specs/16-path-abstraction.md §5):
#   mounts:
#     - host: <absolute host path>
#       container: <absolute container/canonical path>
#
# Semantics:
#   - Both host and container must be absolute. A leading `~` is expanded
#     once on config load.
#   - Duplicate host or duplicate container prefixes are rejected
#     (daemon refuses to start).
#   - Overlapping mounts are allowed (longest-prefix wins on resolution).
#   - The mount map is immutable for the lifetime of each process. Edits
#     require a process restart (no SIGHUP-style reload).
#   - Empty/missing mounts: identity map — host == container, no
#     translation.
#
# Mirror mounts (host == container) are the default style — they eliminate
# translation entirely when chosen well. Non-mirror mounts are needed only
# when a host path cannot exist inside a Linux container (e.g. macOS
# `/Volumes/*` or removable media).
#
# Default: identity (no entries). Uncomment and edit the example below for
# containerised deployments or unusual mount-point layouts.
mounts: []
#mounts:
#  - host: /Users/chris/dev
#    container: /Users/chris/dev          # mirror — default style
#  - host: /Volumes/External/books
#    container: /mnt/external-books
#  - host: ~/reference
#    container: /mnt/reference
