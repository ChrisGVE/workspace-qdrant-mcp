# Taxonomy for zero-shot document classification (Tier 2 tagging).
#
# ~180 concept terms organized by category.
# Each term is embedded once at startup and compared to document
# embeddings via cosine similarity for automatic tag assignment.
#
# Terms should be short, descriptive phrases — the embedding model
# (all-MiniLM-L6-v2) captures semantic meaning best with natural
# language phrases rather than single words.

